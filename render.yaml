services:
  - type: web
    name: pvh-topup
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server_v13:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --worker-class gthread --timeout 30 --graceful-timeout 20 --max-requests 300 --max-requests-jitter 30 --preload
    envVars:
      - key: CAMRAPID_API_KEY
        sync: false
      - key: SIGNING_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      # ⚠️ Was previously committed here as plaintext (1jcVF54vpA2591jnBMQNsvlmIL6AgkwAdmVPr1gr7H0)
      # in a PUBLIC repo — treat that value as compromised. Set a brand-new token
      # directly in the Render dashboard (Environment tab), never in this file.
      - key: ADMIN_PANEL_TOKEN
        sync: false
      # New: needed for auto check-ID + auto top-up
      - key: FAZERCARDS_API_KEY
        sync: false
      - key: FAZERCARDS_BASE_URL
        value: https://api.fzr.cards/api/v2
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: pvh-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
