<!--
DESIGN PLAN — PVH TOPUP storefront (v2: sky-blue glassmorphism, per user request)
Subject: Cambodian mobile-game diamond top-up shop (Free Fire, Mobile Legends).
Audience: young Khmer mobile gamers on phones, low patience, want 3 taps to pay.
Page's job: pick game → pick diamond package → confirm player ID → pay via KHQR → see delivery.

Color (named):
  --bg-top/--bg-bottom: #CDF3FF → #6FB8E6  (open-sky gradient backdrop)
  --glass / --glass-strong: translucent white panels, blurred — the "glass" the user asked for
  --gold: #F2A93B  (sun accent — prices, badges; sky+sun is a natural, literal pairing here)
  --gem:  #0096C7  (deep sky-blue — CTA button, interactive accents)
  --success: #2A9D8F (teal-green — ID valid / delivered states, reads as "clear water" against the sky)
  --text: #0B3A5B (deep navy, readable on light glass) / --muted: #5D82A6

Type: Chakra Petch (display — sharper/gaming feel, replaces Space Grotesk) / Inter (body) / JetBrains Mono (IDs, prices, refs) / Kantumruy Pro (Khmer fallback throughout).

Signature element: cut-gem clipped corners, still applied to cards/buttons/QR frame, now rendered
as frosted glass panels floating over the sky gradient rather than solid dark cards.
-->
<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PVH TOPUP</title>
<meta name="description" content="Game top-up Free Fire, Mobile Legends — ទូទាត់ KHQR លឿន សុវត្ថិភាព ដឹកជញ្ជូនស្វ័យប្រវត្តិ">
<meta property="og:title" content="PVH TOPUP">
<meta property="og:description" content="Game top-up Free Fire, Mobile Legends — ទូទាត់ KHQR លឿន សុវត្ថិភាព">
<meta property="og:image" content="/icon-512.png">
<meta property="og:type" content="website">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0096C7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Kantumruy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg-top:#CDF3FF; --bg-bottom:#6FB8E6;
  --glass:rgba(255,255,255,.38); --glass-strong:rgba(255,255,255,.6); --glass-border:rgba(255,255,255,.65);
  --gold:#F2A93B; --gem:#0096C7; --success:#2A9D8F;
  --text:#0B3A5B; --muted:#5D82A6;
  --danger:#E63946; --radius-facet:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
.icon{display:inline-block; vertical-align:-3px; line-height:0;}
.icon svg{width:1em; height:1em; display:block;}
html,body{margin:0; padding:0; min-height:100%;
  background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%) fixed;
  color:var(--text); font-family:'Inter','Kantumruy Pro',sans-serif; overflow-x:hidden;}
h1,h2,h3,.display,.topbar .sitename,footer .fname,.detail-header .gname,.game-card .label,.product-card .pname,.btn-primary{font-family:'Chakra Petch','Kantumruy Pro',sans-serif; letter-spacing:.2px;}
.mono{font-family:'JetBrains Mono','Kantumruy Pro',monospace;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none;}
::-webkit-scrollbar{display:none;}

.facet{
  clip-path: polygon(var(--radius-facet) 0, 100% 0, 100% calc(100% - var(--radius-facet)), calc(100% - var(--radius-facet)) 100%, 0 100%, 0 var(--radius-facet));
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; background:var(--glass); backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid var(--glass-border); box-shadow:0 4px 22px rgba(11,58,91,.12);
}
.topbar img.logo{height:34px; width:34px; border-radius:8px; object-fit:cover; box-shadow:0 0 12px rgba(212,175,55,.35);}
.topbar .sitename{font-weight:700; font-size:16px; letter-spacing:.3px;}
.topbar .spacer{flex:1;}
.topbar .contact-btn{
  display:flex; align-items:center; gap:6px; padding:8px 12px;
  background:var(--glass-strong); color:var(--gold); font-size:13px; font-weight:600;
  clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
  box-shadow:0 4px 14px rgba(11,58,91,.14), inset 0 1px 0 rgba(255,255,255,.5);
}

/* ---------- hero banner ---------- */
.hero{position:relative; width:100%; aspect-ratio:16/8; overflow:hidden; background:var(--glass);
  clip-path: polygon(0 0, 100% 0, 100% 94%, 0 100%);
  filter:drop-shadow(0 14px 22px rgba(11,58,91,.28));}
.hero-track{display:flex; height:100%; transition:transform .5s ease;}
.hero-slide{flex:0 0 100%; height:100%;}
.hero-slide img{width:100%; height:100%; object-fit:cover; display:block;}
.hero-dots{position:absolute; bottom:14px; left:0; right:0; display:flex; justify-content:center; gap:6px;}
.hero-dots span{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.35);}
.hero-dots span.active{background:var(--gem); width:16px; border-radius:4px;}
.hero-empty{display:flex; align-items:center; justify-content:center; gap:6px; height:100%; color:var(--muted); font-size:13px;}

/* ---------- small promo ---------- */
.promo-strip{display:flex; gap:10px; padding:12px 16px; overflow-x:auto;}
.promo-strip img{height:64px; border-radius:10px; flex:0 0 auto; box-shadow:0 6px 14px rgba(11,58,91,.20);}

/* ---------- section ---------- */
.section{padding:18px 16px 6px;}
.section h2{font-size:15px; color:var(--muted); font-weight:600; letter-spacing:.4px; text-transform:uppercase; margin:0 0 12px;}

/* ---------- game grid ---------- */
.game-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 20px;}
.game-card, .product-card, .id-form, .sheet{
  backdrop-filter:blur(14px) saturate(160%); border:1px solid var(--glass-border);
  box-shadow:0 10px 30px rgba(11,58,91,.18), 0 2px 6px rgba(11,58,91,.10), inset 0 1px 0 rgba(255,255,255,.55);
}
.game-card{
  position:relative; background:var(--glass); overflow:hidden;
  display:flex; flex-direction:column;
}
.game-card .media{position:relative; aspect-ratio:1/.8; overflow:hidden;}
.game-card .media img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s cubic-bezier(.2,.8,.2,1);}
.game-card:active .media img{transform:scale(1.1);}
.game-card .media::after{content:""; position:absolute; inset:0;
  background:linear-gradient(180deg, rgba(11,58,91,0) 55%, rgba(11,58,91,.35) 100%);}
.game-card .gem-badge{position:absolute; top:6px; right:6px; z-index:2; width:20px; height:20px; border-radius:50%;
  background:linear-gradient(145deg, var(--gold), #ffcf7a); display:flex; align-items:center; justify-content:center;
  color:#5a3a06; box-shadow:0 3px 8px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.6);}
.game-card .gem-badge svg{width:11px; height:11px;}
.game-card .info{position:relative; z-index:2; padding:8px 10px 9px; background:var(--glass-strong);
  border-top:1px solid var(--glass-border); display:flex; flex-direction:column; gap:2px;}
.game-card .info .gname{font-weight:700; font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.game-card .info .cta{display:flex; align-items:center; gap:3px; font-size:10.5px; font-weight:600; color:var(--gem);}
.game-card .info .cta svg{width:10px; height:10px;}

/* ---------- product grid (game detail) ---------- */
.detail-header{display:flex; align-items:center; gap:12px; padding:14px 16px;}
.back-btn{width:36px; height:36px; border-radius:10px; background:var(--glass-strong); display:flex; align-items:center; justify-content:center; font-size:18px; box-shadow:0 4px 12px rgba(11,58,91,.14), inset 0 1px 0 rgba(255,255,255,.5);}
.detail-header .gname{font-weight:700; font-size:17px;}

.id-form{margin:0 16px 16px; background:var(--glass); padding:14px; clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
.id-form label{font-size:12px; color:var(--muted); display:block; margin-bottom:6px;}
.id-row{display:flex; gap:8px; margin-bottom:10px;}
.id-field{position:relative; flex:1;}
.id-field.zone-field{flex:0 0 108px;}
.id-field .field-icon{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; z-index:1;}
.id-field .field-icon svg{width:16px; height:16px;}
.id-row input{width:100%; background:var(--glass-strong); border:1px solid rgba(11,58,91,.18); color:var(--text);
  padding:11px 12px 11px 34px; border-radius:8px; font-size:14px; font-family:'JetBrains Mono','Kantumruy Pro',monospace;}
.id-row input:focus{outline:2px solid var(--gem); outline-offset:-1px;}
.id-status{font-size:13px; min-height:18px; padding-top:2px; display:flex; align-items:center; gap:5px;}
.id-status.ok{color:var(--success);}
.id-status.err{color:var(--danger);}
.id-status.checking{color:var(--muted);}
.empty-products{grid-column:1/-1; text-align:center; padding:30px 16px; color:var(--muted); font-size:13.5px; display:flex; flex-direction:column; align-items:center; gap:8px;}
.recent-ids{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
.id-chip{display:flex; align-items:center; gap:5px; padding:6px 11px; border-radius:20px; background:var(--glass-strong);
  border:1px solid var(--glass-border); color:var(--text); font-size:12px; font-weight:600;}
.id-chip svg{width:12px; height:12px;}

.product-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 18px;}
.product-card{
  background:var(--glass); padding:10px 12px 14px; text-align:center; position:relative;
}
.product-card.selected{border-color:var(--gem); box-shadow:0 0 0 1px var(--gem), 0 0 16px rgba(0,150,199,.3);}
.product-card .badge{position:absolute; top:6px; right:10px; font-size:10px; background:var(--gold); color:#1a1305;
  padding:2px 6px; border-radius:4px; font-weight:700; display:flex; align-items:center; gap:3px;}
.product-card .pmedia{width:56px; height:56px; margin:0 auto 8px; border-radius:9px; overflow:hidden;
  background:linear-gradient(160deg, rgba(255,255,255,.5), rgba(255,255,255,.15));
  display:flex; align-items:center; justify-content:center;}
.product-card .pmedia img{width:100%; height:100%; object-fit:cover; display:block;}
.product-card .pmedia .fallback{color:var(--gold); opacity:.9;}
.product-card .pmedia .fallback svg{width:20px; height:20px;}
.product-card .pname{font-size:13px; font-weight:600; margin-bottom:6px; line-height:1.25;
  min-height:2.5em; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
.product-card .pprice{font-family:'JetBrains Mono','Kantumruy Pro',monospace; color:var(--gold); font-weight:600; font-size:15px;}

.buy-bar{position:sticky; bottom:0; z-index:40; padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:var(--glass-strong); backdrop-filter:blur(16px) saturate(160%); border-top:1px solid var(--glass-border);
  box-shadow:0 -6px 22px rgba(11,58,91,.14);
  display:flex; align-items:center; gap:12px;}
.buy-bar .total{flex:1;}
.buy-bar .total .l{font-size:11px; color:var(--muted);}
.buy-bar .total .v{font-family:'JetBrains Mono','Kantumruy Pro',monospace; font-size:18px; font-weight:700; color:var(--gold);}
.btn-primary{
  background:var(--gem); color:#fff; font-weight:700; font-size:14.5px; padding:14px 26px;
  clip-path: polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
.btn-primary:disabled{background:#3a4250; color:var(--muted);}

/* ---------- payment sheet ---------- */
.sheet-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:90; display:flex; align-items:flex-end;}
.sheet{width:100%; background:var(--glass); padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  clip-path: polygon(18px 0,100% 0,100% 100%,0 100%,0 18px); max-height:88vh; overflow-y:auto;}
.sheet h3{margin:0 0 4px;}
.sheet .sub{color:var(--muted); font-size:13px; margin-bottom:16px;}
.qr-frame{background:#fff; padding:16px; margin:0 auto 14px; width:min(240px,70vw);
  box-shadow:0 10px 26px rgba(11,58,91,.20);
  clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
.qr-frame canvas, .qr-frame img{width:100%; height:auto; display:block;}
.pay-amount{text-align:center; font-family:'JetBrains Mono','Kantumruy Pro',monospace; font-size:22px; color:var(--gold); font-weight:700; margin-bottom:4px;}
.pay-timer{text-align:center; color:var(--muted); font-size:13px; margin-bottom:16px;}
.pay-status{text-align:center; padding:12px; border-radius:10px; font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:6px;}
.pay-status.waiting{background:rgba(255,255,255,.05); color:var(--muted);}
.pay-status.success{background:rgba(42,157,143,.14); color:var(--success);}
.pay-status.processing{background:rgba(242,169,59,.14); color:var(--gold);}
.pay-status.failed{background:rgba(255,107,107,.12); color:var(--danger);}

.receipt{margin-top:14px; background:var(--glass); border:1px solid var(--glass-border); border-radius:12px; padding:14px 16px; backdrop-filter:blur(10px);}
.receipt-row{display:flex; justify-content:space-between; gap:12px; padding:6px 0; font-size:13px; border-bottom:1px dashed rgba(11,58,91,.12);}
.receipt-row:last-child{border-bottom:none;}
.receipt-row .l{color:var(--muted);}
.receipt-row .v{font-family:'JetBrains Mono',monospace; font-weight:600; text-align:right;}
.receipt-total{display:flex; justify-content:space-between; margin-top:8px; padding-top:10px; border-top:1px solid var(--glass-border); font-weight:700;}
.receipt-total .v{font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:16px;}
.copy-receipt-btn{width:100%; margin-top:12px; padding:11px; border-radius:10px; background:var(--gem); color:#fff; font-weight:600; font-size:13.5px; display:flex; align-items:center; justify-content:center; gap:6px;}
.copy-receipt-btn.copied{background:var(--success);}
.sheet .close-btn{width:100%; margin-top:16px; padding:12px; background:var(--glass-strong); color:var(--muted); border-radius:10px; font-weight:600; box-shadow:0 3px 10px rgba(11,58,91,.10), inset 0 1px 0 rgba(255,255,255,.5);}

/* ---------- footer ---------- */
footer{padding:28px 16px 40px; text-align:center; color:var(--muted); font-size:12px; border-top:1px solid var(--glass-border); margin-top:10px;}
footer .fname{color:var(--text); font-weight:700; margin-bottom:6px;}
footer .links{display:flex; justify-content:center; gap:16px; margin:10px 0;}

.skeleton{background:linear-gradient(90deg, var(--glass) 25%, var(--glass-strong) 37%, var(--glass) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:0 0;}}

.toast{position:fixed; left:16px; right:16px; bottom:20px; z-index:200; padding:13px 16px; border-radius:10px;
  background:var(--glass-strong); color:var(--text); font-size:13.5px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.4);
  transform:translateY(120%); transition:transform .25s ease;}
.toast.show{transform:translateY(0);}
.toast.err{background:rgba(255,107,107,.16); color:var(--danger);}

/* ---------- micro-interactions: press feedback ---------- */
.game-card, .product-card, .btn-primary, .back-btn, .contact-btn, .close-btn, .social-link{
  transition:transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, opacity .15s ease;
  will-change:transform;
}
.game-card:active, .contact-btn:active, .close-btn:active, .social-link:active{transform:scale(.96);}
.product-card:active{transform:scale(.95);}
.btn-primary:active:not(:disabled){transform:scale(.96);}
.back-btn:active{transform:scale(.88) rotate(-6deg);}
.product-card.selected{transform:scale(1.015);}

/* ---------- micro-interactions: scroll reveal ---------- */
.fade-in-section{opacity:0; transform:translateY(18px); transition:opacity .55s cubic-bezier(.2,.8,.2,1), transform .55s cubic-bezier(.2,.8,.2,1);}
.fade-in-section.visible{opacity:1; transform:translateY(0);}

/* ---------- social icons ---------- */
.social-row{display:flex; justify-content:center; align-items:center; gap:14px; margin:14px 0 6px;}
.social-link{width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:var(--glass-strong); border:1px solid var(--glass-border);
  box-shadow:0 4px 12px rgba(11,58,91,.14), inset 0 1px 0 rgba(255,255,255,.5);}
.social-link svg{width:20px; height:20px;}
.social-link.telegram{color:#29A9EA;}
.social-link.facebook{color:#1877F2;}
.social-link.tiktok{color:#0B3A5B;}
.social-link:hover{box-shadow:0 6px 16px rgba(11,58,91,.22), inset 0 1px 0 rgba(255,255,255,.6);}

@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>

// ---- helpers ----
function $(sel, root){ return (root||document).querySelector(sel); }
function vibrate(ms){ if(navigator.vibrate){ try{ navigator.vibrate(ms || 10); }catch(e){} } }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg, isErr){
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toast._h);
  toast._h = setTimeout(()=> t.classList.remove("show"), 3200);
}
async function api(path, opts){
  opts = opts || {};
  const res = await fetch("/api/" + path, {
    method: opts.method || "GET",
    headers: Object.assign({"Content-Type":"application/json"}, opts.headers||{}),
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let data;
  try { data = await res.json(); } catch(e){ data = {}; }
  return data;
}
function decryptPayload(payloadB64){
  const bytes = CryptoJS.AES.decrypt(payloadB64, PAYLOAD_KEY);
  const text = bytes.toString(CryptoJS.enc.Utf8);
  return JSON.parse(text);
}

// ---- recent Player IDs (localStorage, per game — pure convenience, no server round-trip) ----
const RECENT_IDS_KEY = "pvh_recent_ids_v1";
function loadRecentIds(){
  try{ return JSON.parse(localStorage.getItem(RECENT_IDS_KEY) || "{}"); }catch(e){ return {}; }
}
function saveRecentId(gameCode, playerId, zoneId, name){
  if(!playerId) return;
  const all = loadRecentIds();
  const list = (all[gameCode] || []).filter(e => e.playerId !== playerId);
  list.unshift({ playerId, zoneId: zoneId || "", name: name || "", ts: Date.now() });
  all[gameCode] = list.slice(0, 3);
  try{ localStorage.setItem(RECENT_IDS_KEY, JSON.stringify(all)); }catch(e){}
}
function getRecentIds(gameCode){
  return (loadRecentIds()[gameCode] || []);
}
function lastUsedPlayerIdAnyGame(){
  const all = loadRecentIds();
  let best = null;
  Object.values(all).forEach(list => (list||[]).forEach(e => { if(!best || e.ts > best.ts) best = e; }));
  return best;
}

let idCheckTimer = null;
function onIdInput(field, value){
  state[field] = value;

  const needsZone = !!state.activeGame.has_server_id;

  idCheckTimer = setTimeout(checkId, 550);
}
async function checkId(){
  state.idCheck = "checking";
  renderIdStatus();
  const r = await api("check-user", {method:"POST", body:{
    gameCode: state.activeGame.code, userId: state.playerId, zoneId: state.zoneId || undefined,
  }});
  if(r.success && r.name){
    state.idCheck = {ok:true, name:r.name};
    saveRecentId(state.activeGame.code, state.playerId, state.zoneId, r.name);
  } else if(r.success && r.name === null){
    state.idCheck = null; // auto-check unavailable server-side, don't block checkout
  } else {
    state.idCheck = {ok:false};
  }
  renderIdStatus();
}
function renderIdStatus(){
  const el = $("#idStatus");

  else if(state.idCheck && !state.idCheck.ok){ el.innerHTML = ICONS.cross + " រកមិនឃើញ Player ID"; el.className = "id-status err"; }
  else { el.textContent = ""; el.className = "id-status"; }

let pollPayTimer = null, pollTopupTimer = null, countdownTimer = null;

async function buyNow(){
  if(!state.selectedProduct) return;
  vibrate(14);
  const amount = Number(state.selectedProduct.price);
  const userId = state.playerId;

  const btn = $("#buyBtn");

    method:"POST",
    body:{userId, zoneId: state.zoneId || "", gameCode: state.activeGame.code, productId: state.selectedProduct.id},
  });

    return;

  openPaymentSheet(r.trx_id, r.qr_data, amount);

function openPaymentSheet(trxId, qrData, amount){
  let secondsLeft = PAY_TIMEOUT_SECONDS;
  const root = document.createElement("div");
  root.className = "sheet-backdrop";
  root.id = "paySheet";
  root.innerHTML = `
    <div class="sheet">
      <h3>ស្កេន QR ដើម្បីទូទាត់</h3>
      <div class="sub">CamRapidPay · KHQR</div>
      <div class="qr-frame" id="qrFrame"></div>
      <div class="pay-amount">$${amount.toFixed(2)}</div>
      <div class="pay-timer" id="payTimer">នៅសល់ 05:00</div>
      <div class="pay-status waiting" id="payStatus">កំពុងរង់ចាំការទូទាត់...</div>
      <button class="close-btn" id="closeSheetBtn">បិទ</button>
    </div>`;
  document.body.appendChild(root);
  new QRCode($("#qrFrame"), { text: qrData, width: 400, height: 400, correctLevel: QRCode.CorrectLevel.M });

  $("#closeSheetBtn").onclick = () => closePaymentSheet(trxId, true);

  countdownTimer = setInterval(() => {
    secondsLeft--;
    const m = String(Math.floor(secondsLeft/60)).padStart(2,"0");
    const s = String(secondsLeft%60).padStart(2,"0");
    const timerEl = $("#payTimer");
    if(timerEl) timerEl.textContent = `នៅសល់ ${m}:${s}`;
    if(secondsLeft <= 0){
      clearInterval(countdownTimer);
      api("expire-payment", {method:"POST", body:{trx_id: trxId}});
      setPayStatus("failed", "QR ផុតកំណត់ — សូមចាប់ផ្តើមម្តងទៀត");
      clearInterval(pollPayTimer);
    }
  }, 1000);

  pollPayTimer = setInterval(async () => {
    const r = await api("check-payment", {method:"POST", body:{trx_id: trxId}});
    if(r.paid){
      clearInterval(pollPayTimer);
      clearInterval(countdownTimer);
      const ds = (r.data && r.data.delivery_status) || null;
      handleDeliveryStatus(trxId, ds, r.data || null);
    } else if(r.expired){
      clearInterval(pollPayTimer);
      clearInterval(countdownTimer);
      setPayStatus("failed", "QR ផុតកំណត់ — សូមចាប់ផ្តើមម្តងទៀត");
    }
  }, 3000);
}

function setPayStatus(kind, html){
  const el = $("#payStatus");
  if(!el) return;
  el.className = "pay-status " + kind;
  el.innerHTML = html;
}

function fmtDateTime(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "—";
  const pad = n => String(n).padStart(2,"0");
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function deliveryStatusLabel(ds){
  if(ds === "delivered") return "✓ បានបញ្ជូនស្វ័យប្រវត្តិ";
  if(ds === "processing") return "កំពុងបញ្ជូន";
  if(ds === "failed") return "បញ្ជូនមិនកើត — ត្រូវការ manual";
  return "រង់ចាំ admin បញ្ជូន";
}
function receiptText(order, trxId){
  const g = state.activeGame, p = state.selectedProduct;
  return [
    `វិក័យប័ត្រ PVH TOPUP`,
    `Trx ID: ${trxId}`,
    `ថ្ងៃ: ${fmtDateTime(order.paid_at || order.created_at)}`,
    `ហ្គេម: ${g ? g.name : order.game_code}`,
    `Package: ${p ? p.name : ""}`,
    `Player ID: ${order.user_id}${order.zone_id ? " ("+order.zone_id+")" : ""}`,
    `តម្លៃ: $${Number(order.amount).toFixed(2)}`,
    `ស្ថានភាព: ${deliveryStatusLabel(order.delivery_status)}`,
  ].join("\n");
}
function renderReceipt(order, trxId){
  const sheetEl = $("#paySheet .sheet");
  if(!sheetEl) return;
  const g = state.activeGame, p = state.selectedProduct;
  const old = $("#receiptBlock");
  if(old) old.remove();
  const block = document.createElement("div");
  block.className = "receipt";
  block.id = "receiptBlock";
  block.innerHTML = `
    <div class="receipt-row"><span class="l">Trx ID</span><span class="v">${esc(trxId)}</span></div>
    <div class="receipt-row"><span class="l">ថ្ងៃ</span><span class="v">${esc(fmtDateTime(order.paid_at || order.created_at))}</span></div>
    <div class="receipt-row"><span class="l">ហ្គេម</span><span class="v">${esc(g ? g.name : order.game_code)}</span></div>
    <div class="receipt-row"><span class="l">Package</span><span class="v">${esc(p ? p.name : "")}</span></div>
    <div class="receipt-row"><span class="l">Player ID</span><span class="v">${esc(order.user_id)}${order.zone_id ? " ("+esc(order.zone_id)+")" : ""}</span></div>
    <div class="receipt-row"><span class="l">ស្ថានភាព</span><span class="v">${esc(deliveryStatusLabel(order.delivery_status))}</span></div>
    <div class="receipt-total"><span>សរុប</span><span class="v">$${Number(order.amount).toFixed(2)}</span></div>
    <button class="copy-receipt-btn" id="copyReceiptBtn">${ICONS.chat} ចម្លងវិក័យប័ត្រ</button>
  `;
  sheetEl.insertBefore(block, $("#closeSheetBtn"));
  $("#copyReceiptBtn").onclick = async () => {
    const btn = $("#copyReceiptBtn");
    try{
      await navigator.clipboard.writeText(receiptText(order, trxId));
      btn.classList.add("copied");
      btn.innerHTML = `${ICONS.check} បានចម្លង!`;
      setTimeout(()=>{ btn.classList.remove("copied"); btn.innerHTML = `${ICONS.chat} ចម្លងវិក័យប័ត្រ`; }, 2000);
    }catch(e){ toast("មិនអាចចម្លងបានទេ", true); }
  };
}

function handleDeliveryStatus(trxId, ds, order){
  if(ds === "delivered"){
    setPayStatus("success", ICONS.check + " ទូទាត់ជោគជ័យ — ទទួល Diamond ដោយស្វ័យប្រវត្តិ!");
  } else if(ds === "processing"){
    setPayStatus("processing", ICONS.clock + " កំពុងបញ្ជូន Diamond ស្វ័យប្រវត្តិ...");
    pollTopupTimer = setInterval(async () => {
      const r = await api("check-topup-status", {method:"POST", body:{trx_id: trxId}});
      if(r.delivery_status === "delivered"){
        clearInterval(pollTopupTimer);
        setPayStatus("success", ICONS.check + " ទូទាត់ជោគជ័យ — ទទួល Diamond ដោយស្វ័យប្រវត្តិ!");
        if(order){ order.delivery_status = "delivered"; renderReceipt(order, trxId); }
      } else if(r.delivery_status === "failed"){
        clearInterval(pollTopupTimer);
        setPayStatus("failed", "ទូទាត់ជោគជ័យ ប៉ុន្តែបញ្ជូនស្វ័យប្រវត្តិមិនកើត — ទាក់ទង admin ខាងក្រោម");
        if(order){ order.delivery_status = "failed"; renderReceipt(order, trxId); }
      }
    }, 4000);
  } else if(ds === "failed"){
    setPayStatus("failed", "ទូទាត់ជោគជ័យ ប៉ុន្តែបញ្ជូនស្វ័យប្រវត្តិមិនកើត — ទាក់ទង admin ខាងក្រោម");
  } else {
    setPayStatus("success", ICONS.check + " ទូទាត់ជោគជ័យ — admin នឹងបញ្ជូនជូនក្នុងពេលឆាប់ៗ");
  }
  if(order) renderReceipt(order, trxId);
}

function closePaymentSheet(trxId, userClosed){
  clearInterval(pollPayTimer); clearInterval(pollTopupTimer); clearInterval(countdownTimer);
  const el = $("#paySheet");
  if(el) el.remove();
  const btn = $("#buyBtn");
  if(btn){ btn.disabled = false; btn.textContent = "ទិញឥឡូវ"; }
  if(userClosed && trxId) api("expire-payment", {method:"POST", body:{trx_id: trxId}}).catch(()=>{});
}

let heroTimer = null;
function startHeroRotation(){
  clearInterval(heroTimer);
  const slides = (state.banners||[]).filter(b => b.type === "main_slider");

  heroTimer = setInterval(() => {

    document.querySelectorAll(".hero-dots span").forEach((d,i)=>d.classList.toggle("active", i===state.heroIndex));
  }, 4000);

// ---- micro-interactions: reveal sections as they scroll into view ----
let revealObserver = null;
function initScrollReveal(){
  if(!("IntersectionObserver" in window)) return;
  if(!revealObserver){
    revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add("visible");
          revealObserver.unobserve(entry.target);
        }
      });
    }, {threshold:0.12, rootMargin:"0px 0px -40px 0px"});
  }
  const targets = document.querySelectorAll(
    "#main .section, #main .game-grid, #main .product-grid, #main .id-form, #main .hero, #main .promo-strip, #main .detail-header"
  );
  targets.forEach(el => {
    if(!el.classList.contains("fade-in-section")){
      el.classList.add("fade-in-section");
      revealObserver.observe(el);
    }
  });
}

      <div class="sitename">${esc(s.SITE_NAME || "PVH TOPUP")}</div>
      <div class="spacer"></div>
      <button class="contact-btn" onclick="__app.openMyOrders()">${ICONS.history} ការបញ្ជាទិញ</button>
      ${s.ADMIN_TELEGRAM_LINK ? `<a class="contact-btn" href="${esc(s.ADMIN_TELEGRAM_LINK)}" target="_blank">${ICONS.chat} ជំនួយ</a>` : ""}
    `;
  }
  const ft = $("#footer");
  if(ft){
    ft.innerHTML = `
      <div class="fname">${esc(s.FOOTER_NAME || "PVH TOPUP")}</div>
      <div>${esc(s.FOOTER_DESC || "")}</div>
      <div class="social-row">
        ${s.ADMIN_TELEGRAM_LINK ? `<a class="social-link telegram" href="${esc(s.ADMIN_TELEGRAM_LINK)}" target="_blank" aria-label="Telegram">${ICONS.telegram}</a>` : ""}
        ${s.FACEBOOK_LINK ? `<a class="social-link facebook" href="${esc(s.FACEBOOK_LINK)}" target="_blank" aria-label="Facebook">${ICONS.facebook}</a>` : ""}
        ${s.TIKTOK_LINK ? `<a class="social-link tiktok" href="${esc(s.TIKTOK_LINK)}" target="_blank" aria-label="TikTok">${ICONS.tiktok}</a>` : ""}
      </div>
      <div>${esc(s.COPYRIGHT || "")}</div>
    `;
  }
}

function renderHeroAndPromo(){
  const mainSlides = (state.banners||[]).filter(b=>b.type==="main_slider");
  const promoSlides = (state.banners||[]).filter(b=>b.type==="small_promo");
  const hero = mainSlides.length ? `
    <div class="hero">
      <div class="hero-track" id="heroTrack">
        ${mainSlides.map(b => `<div class="hero-slide"><img src="${esc(b.image_url)}" alt=""></div>`).join("")}
      </div>
      ${mainSlides.length>1 ? `<div class="hero-dots">${mainSlides.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join("")}</div>` : ""}
    </div>` : `<div class="hero"><div class="hero-empty">${ICONS.image} មិនទាន់មាន banner</div></div>`;
  const promo = promoSlides.length ? `
    <div class="promo-strip">${promoSlides.map(b=>`<img src="${esc(b.image_url)}" alt="">`).join("")}</div>` : "";
  return hero + promo;
}

function renderHome(){
  return `
    ${renderHeroAndPromo()}
    <div class="section"><h2>ជ្រើសរើសហ្គេម</h2></div>
    <div class="game-grid">
      ${state.games.length ? state.games.map(g => `
        <div class="game-card facet" onclick="__app.openGame(${g.id})">
          <div class="media">
            ${g.image_url ? `<img src="${esc(g.image_url)}" alt="" loading="lazy">` : ""}
            <div class="gem-badge">${ICONS.diamond}</div>
          </div>
          <div class="info">
            <div class="gname">${esc(g.name)}</div>
            <div class="cta">ចាប់ផ្តើមទិញ ${ICONS.chevronRight}</div>
          </div>
        </div>`).join("") : `<div class="skeleton" style="height:150px;border-radius:12px;"></div><div class="skeleton" style="height:150px;border-radius:12px;"></div>`}
    </div>
  `;
}

function renderGame(){
  const g = state.activeGame;
  const needsZone = !!g.has_server_id;
  const productsHtml = state.productsLoading
    ? `<div class="skeleton" style="height:140px;border-radius:12px;"></div><div class="skeleton" style="height:140px;border-radius:12px;"></div><div class="skeleton" style="height:140px;border-radius:12px;"></div><div class="skeleton" style="height:140px;border-radius:12px;"></div>`
    : (state.products.length ? state.products.map(p => `
    <div class="product-card facet ${state.selectedProduct && state.selectedProduct.id===p.id ? 'selected':''}" onclick="__app.selectProduct(${p.id})">
      ${p.section==='recommend' ? `<span class="badge">${ICONS.star} ពេញនិយម</span>` : ""}
      <div class="pmedia">
        ${p.image_url ? `<img src="${esc(p.image_url)}" alt="" loading="lazy">` : `<span class="fallback">${ICONS.diamond}</span>`}
      </div>
      <div class="pname">${esc(p.name)}</div>
      <div class="pprice">$${Number(p.price).toFixed(2)}</div>
    </div>`).join("") : `<div class="empty-products">${ICONS.image} មិនទាន់មាន package សម្រាប់ហ្គេមនេះទេ — សូមទាក់ទង admin</div>`);

  const recent = getRecentIds(g.code).filter(e => e.playerId !== state.playerId);
  const chipsHtml = recent.length ? `
    <div class="recent-ids">
      ${recent.map(e => `<button class="id-chip" onclick="__app.useRecentId('${esc(e.playerId)}','${esc(e.zoneId)}','${esc(e.name)}')">${ICONS.user} ${esc(e.name || e.playerId)}</button>`).join("")}
    </div>` : "";

  return `
    <div class="detail-header">
      <div class="back-btn" onclick="__app.goHome()">${ICONS.chevronLeft}</div>
      <div class="gname">${esc(g.name)}</div>
    </div>
    <div class="id-form">
      <label>Player ID</label>
      <div class="id-row">
        <div class="id-field">
          <span class="field-icon">${ICONS.user}</span>
          <input type="text" inputmode="numeric" placeholder="បញ្ចូល Player ID" value="${esc(state.playerId)}"
            oninput="__app.onIdInput('playerId', this.value)">
        </div>
        ${needsZone ? `<div class="id-field zone-field">
          <span class="field-icon">${ICONS.zone}</span>
          <input type="text" inputmode="numeric" placeholder="Zone ID" value="${esc(state.zoneId)}"
            oninput="__app.onIdInput('zoneId', this.value)">
        </div>` : ""}
      </div>
      <div class="id-status" id="idStatus"></div>
      ${chipsHtml}
    </div>
    <div class="section"><h2>ជ្រើសរើស Package</h2></div>
    <div class="product-grid">${productsHtml}</div>
    <div class="buy-bar">
      <div class="total">
        <div class="l">សរុប</div>
        <div class="v">$${state.selectedProduct ? Number(state.selectedProduct.price).toFixed(2) : "0.00"}</div>
      </div>
      <button class="btn-primary" id="buyBtn" disabled onclick="__app.buyNow()">ទិញឥឡូវ</button>
    </div>
  `;
}

function render(){
  const app = $("#app");
  app.innerHTML = `
    <div class="topbar" id="topbar"></div>
    <div id="main">${state.view === "home" ? renderHome() : renderGame()}</div>
    <footer id="footer"></footer>
  `;
  renderTopbarAndFooter();
  if(state.view === "game"){ renderIdStatus(); updateBuyBarState(); }
  initScrollReveal();
}

// expose the handful of functions used by inline onclick/oninput in rendered HTML
window.__app = { openGame: (id)=>{ const g = state.games.find(x=>x.id===id); if(g) openGame(g); },
  goHome, selectProduct, onIdInput, buyNow, useRecentId, openMyOrders, closeMyOrders, searchMyOrders };

// ---- boot ----
render();
loadSiteSettings();
loadHome();

})();
</script>
</body>
</html>
