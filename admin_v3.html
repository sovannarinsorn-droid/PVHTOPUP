<!doctype html>
<html lang="km">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PVH TOPUP — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro:wght@400;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f16;
  --bg-grad: radial-gradient(1200px 600px at 100% -10%, rgba(232,176,75,.10), transparent 60%),
             radial-gradient(1000px 500px at -10% 110%, rgba(79,209,197,.08), transparent 60%);
  --panel:#161a24;
  --panel-2:#1d2230;
  --panel-3:#232939;
  --line:#2a3040;
  --gold:#e8b04b;
  --gold-soft:#f3c66e;
  --gold-dim:#8a6a2c;
  --teal:#4fd1c5;
  --red:#f0666c;
  --green:#6fd88a;
  --text:#eef1f6;
  --text-dim:#8b93a3;
  --radius:14px;
  --shadow: 0 10px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--panel-3);border-radius:8px;}
body{
  margin:0; background:var(--bg); background-image:var(--bg-grad); background-attachment:fixed;
  color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px;
}
h1,h2,h3,.khmer{font-family:'Kdam Thmor Pro',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}

/* ---- Login gate ---- */
#gate{
  height:100vh; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px; padding:20px;
}
#gate .card{
  background:linear-gradient(180deg, var(--panel-2), var(--panel));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:40px 36px; width:100%; max-width:340px; text-align:center; box-shadow:var(--shadow);
}
#gate .logo-badge{
  width:56px; height:56px; border-radius:16px; margin:0 auto 16px; display:flex; align-items:center;
  justify-content:center; font-size:26px; background:linear-gradient(135deg, var(--gold), #a97a1f);
  box-shadow:0 6px 20px rgba(232,176,75,.35);
}
#gate .brand{color:var(--gold-soft); font-size:22px; margin-bottom:4px; letter-spacing:.02em;}
#gate p{color:var(--text-dim); margin:0 0 22px; font-size:14px;}
#gate input{
  width:100%; padding:13px 14px; border-radius:10px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-size:15px; margin-bottom:14px; transition:border-color .15s;
}
#gate input:focus{outline:none; border-color:var(--gold-dim);}
#gate button, .btn{
  width:100%; padding:13px; border-radius:10px; border:none;
  background:linear-gradient(135deg, var(--gold-soft), var(--gold)); color:#1a1206; font-weight:700; font-size:15px;
  cursor:pointer; letter-spacing:.02em; transition:filter .15s, transform .1s;
}
#gate button:hover, .btn:hover{filter:brightness(1.08);}
#gate button:active, .btn:active{transform:scale(.98);}
#gate .err{color:var(--red); font-size:13px; min-height:18px;}

/* ---- App shell ---- */
#app{display:none; height:100vh;}
.shell{display:flex; height:100%; position:relative;}
.overlay{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:15;
}
.overlay.show{display:block;}
nav{
  width:220px; background:linear-gradient(180deg, var(--panel), #12151d); border-right:1px solid var(--line);
  padding:22px 0; flex-shrink:0; display:flex; flex-direction:column; z-index:20;
}
nav .logo{padding:0 20px 20px; color:var(--gold-soft); font-size:19px; border-bottom:1px solid var(--line); margin-bottom:10px; display:flex; align-items:center; gap:10px;}
nav .logo .badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg, var(--gold-soft), var(--gold));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
nav .logo small{display:block; color:var(--text-dim); font-size:10.5px; font-family:'Rajdhani'; font-weight:600; letter-spacing:.1em; margin-top:1px;}
nav button{
  text-align:left; background:none; border:none; color:var(--text-dim);
  padding:13px 20px; font-family:'Rajdhani'; font-size:15.5px; font-weight:600;
  cursor:pointer; border-left:3px solid transparent; display:flex; align-items:center; gap:10px;
  transition:background .15s, color .15s;
}
nav button:hover{color:var(--text); background:var(--panel-2);}
nav button.active{color:var(--gold-soft); background:var(--panel-2); border-left-color:var(--gold);}
nav .spacer{flex:1;}
nav .logout{color:var(--red); font-size:13px; opacity:.8;}
.topbar{display:none;}
main{flex:1; overflow-y:auto; padding:30px 36px;}
main h1{font-size:23px; margin:0 0 4px; color:var(--text); display:flex; align-items:center; gap:10px;}
main .sub{color:var(--text-dim); font-size:14px; margin:0 0 20px;}

.stats-row{display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;}
.stat-chip{
  background:linear-gradient(180deg, var(--panel-2), var(--panel)); border:1px solid var(--line);
  border-radius:12px; padding:12px 18px; min-width:110px; box-shadow:var(--shadow);
}
.stat-chip .n{font-size:22px; font-weight:700; color:var(--gold-soft); font-family:'JetBrains Mono';}
.stat-chip .l{font-size:12px; color:var(--text-dim); margin-top:2px;}

.toolbar{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;}
.toolbar select, .toolbar input{
  padding:10px 12px; border-radius:9px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-family:'Rajdhani'; font-size:14px;
}
.toolbar .btn{width:auto; padding:10px 20px; font-size:14px;}
.btn.ghost{background:none; border:1px solid var(--gold-dim); color:var(--gold-soft);}
.btn.small{padding:7px 14px; font-size:13px;}
.btn.danger{background:linear-gradient(135deg, #f0666c, #c23e44); color:#2a0d0f;}

.card-panel{
  background:linear-gradient(180deg, var(--panel-2), var(--panel)); border:1px solid var(--line);
  border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
}
table{width:100%; border-collapse:collapse;}
th, td{padding:12px 14px; text-align:left; border-bottom:1px solid var(--line); font-size:14px; vertical-align:middle;}
th{color:var(--text-dim); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; background:var(--panel-3);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.015);}
td.actions{white-space:nowrap; width:1%;}
td input{
  width:100%; padding:7px 9px; border-radius:7px; border:1px solid var(--line);
  background:var(--panel-3); color:var(--text); font-family:'Rajdhani'; font-size:14px;
}
td input:focus{outline:none; border-color:var(--gold-dim);}

.badge{padding:4px 11px; border-radius:999px; font-size:11.5px; font-weight:700; display:inline-block; letter-spacing:.02em;}
.badge.pending{background:#3a3420; color:#e8c04b;}
.badge.processing{background:#1f3a3a; color:var(--teal);}
.badge.delivered{background:#1e3a24; color:var(--green);}
.badge.failed{background:#3a1f22; color:var(--red);}
.badge.manual{background:#302a3a; color:#b39ddb;}
.badge.paid{background:#1e3a24; color:var(--green);}
.badge.expired{background:#2a2a2a; color:var(--text-dim);}
.badge.cancelled{background:#2a2a2a; color:var(--text-dim);}

.new-row{background:rgba(232,176,75,.05);}
.empty{color:var(--text-dim); text-align:center; padding:48px 12px; font-size:14px;}
.empty .ic{font-size:30px; display:block; margin-bottom:10px; opacity:.6;}
.skeleton{padding:20px;}
.skeleton .bar{height:14px; border-radius:7px; background:linear-gradient(90deg, var(--panel-3), var(--panel-2), var(--panel-3)); background-size:200% 100%; animation:shimmer 1.2s infinite; margin-bottom:10px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

.toast{
  position:fixed; bottom:22px; right:22px; left:auto; background:var(--panel-2); border:1px solid var(--line);
  padding:13px 20px; border-radius:10px; font-size:14px; opacity:0; transform:translateY(8px);
  transition:all .25s; pointer-events:none; box-shadow:var(--shadow); max-width:calc(100vw - 44px); z-index:50;
}
.toast.show{opacity:1; transform:translateY(0);}
.toast.err{border-color:var(--red); color:var(--red);}
.toast.ok{border-color:var(--green); color:var(--green);}

.settings-form{max-width:560px; display:flex; flex-direction:column; gap:16px;}
.settings-form label{font-size:13px; color:var(--text-dim); font-weight:600; display:block; margin-bottom:6px;}
.settings-form input, .settings-form textarea{
  width:100%; padding:11px 13px; border-radius:9px; border:1px solid var(--line);
  background:var(--panel-3); color:var(--text); font-family:'Rajdhani'; font-size:15px;
}
.settings-form input:focus, .settings-form textarea:focus{outline:none; border-color:var(--gold-dim);}
.settings-form textarea{resize:vertical; min-height:60px;}

/* ---- Image upload widget (used for games/products/banners/logo) ---- */
.img-field{display:flex; align-items:center; gap:8px;}
.img-field .thumb{
  width:38px; height:38px; border-radius:8px; object-fit:cover; background:var(--panel-3);
  border:1px solid var(--line); flex-shrink:0;
}
.img-field .thumb.empty-thumb{display:flex; align-items:center; justify-content:center; font-size:15px; color:var(--text-dim);}
.img-field input[type=text]{flex:1; min-width:90px;}
.img-field .upload-btn{
  flex-shrink:0; width:34px; height:34px; border-radius:8px; border:1px solid var(--gold-dim);
  background:var(--panel-3); color:var(--gold-soft); display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:15px; transition:background .15s;
}
.img-field .upload-btn:hover{background:var(--panel-2);}
.img-field .upload-btn.loading{opacity:.5; pointer-events:none;}
.img-field input[type=file]{display:none;}
.settings-form .img-field{max-width:340px;}
.settings-form .img-field .thumb{width:50px; height:50px; border-radius:50%;}

/* ---- Mobile responsive ---- */
@media (max-width: 900px){
  .shell{display:block;}
  nav{
    position:fixed; top:0; left:0; bottom:0; transform:translateX(-100%);
    transition:transform .2s ease; box-shadow:var(--shadow);
  }
  nav.open{transform:translateX(0);}
  .topbar{
    display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--panel);
    border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10;
  }
  .topbar .hamburger{
    width:38px; height:38px; border-radius:9px; border:1px solid var(--line); background:var(--panel-2);
    color:var(--text); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .topbar .title{color:var(--gold-soft); font-size:17px;}
  main{padding:18px 16px 90px;}
  main h1{font-size:19px;}
  table, thead, tbody, th, tr, td{display:block;}
  thead{display:none;}
  .card-panel table tr{
    border-bottom:1px solid var(--line); padding:12px 14px; display:block;
  }
  .card-panel table tr:last-child{border-bottom:none;}
  td{border:none; padding:6px 0;}
  td:before{
    content:attr(data-label); display:block; font-size:10.5px; color:var(--text-dim);
    text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px;
  }
  td.actions{width:auto; display:flex; gap:8px; padding-top:8px;}
  .toast{left:16px; right:16px; bottom:16px; max-width:none;}
}
@media (min-width: 901px){
  .topbar{display:none;}
}
</style>
</head>
<body>

<div id="gate">
  <div class="card">
    <div class="logo-badge">💎</div>
    <div class="brand khmer">PVH TOPUP</div>
    <p>Admin Panel</p>
    <input id="pwInput" type="password" placeholder="Admin password" />
    <button onclick="login()">ចូល / Login</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div id="app">
  <div class="shell">
    <div class="overlay" id="navOverlay" onclick="closeNav()"></div>
    <nav id="sideNav">
      <div class="logo khmer"><span class="badge">💎</span><span>PVH TOPUP<small>ADMIN PANEL</small></span></div>
      <button data-tab="games" class="active" onclick="switchTab('games')">🎮 Games</button>
      <button data-tab="products" onclick="switchTab('products')">💠 Products</button>
      <button data-tab="banners" onclick="switchTab('banners')">🖼️ Banners</button>
      <button data-tab="transactions" onclick="switchTab('transactions')">🧾 Transactions</button>
      <button data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
      <div class="spacer"></div>
      <button class="logout" onclick="logout()">↩ Logout</button>
    </nav>
    <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
      <div class="topbar">
        <div class="hamburger" onclick="openNav()">☰</div>
        <div class="title khmer">PVH TOPUP</div>
      </div>
      <main id="main"></main>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = ""; // same origin — calls go to /api/admin-*
function getToken(){ return localStorage.getItem("pvh_admin_token") || ""; }
function setToken(t){ localStorage.setItem("pvh_admin_token", t); }
function clearToken(){ localStorage.removeItem("pvh_admin_token"); }

function openNav(){ document.getElementById("sideNav").classList.add("open"); document.getElementById("navOverlay").classList.add("show"); }
function closeNav(){ document.getElementById("sideNav").classList.remove("open"); document.getElementById("navOverlay").classList.remove("show"); }

async function api(path, opts = {}) {
  const res = await fetch(`/api/${path}`, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": getToken(),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { logout(); throw new Error("Session expired"); }
  const data = await res.json();
  if (!data.success && res.status >= 400) throw new Error(data.error || "Request failed");
  return data;
}

// Multipart upload — does NOT set Content-Type manually (browser sets the boundary)
async function uploadFile(file) {
  const form = new FormData();
  form.append("file", file);
  const res = await fetch("/api/admin-upload", {
    method: "POST",
    headers: { "x-admin-token": getToken() },
    body: form,
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || "Upload failed");
  return data.url;
}

function toast(msg, kind = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast show ${kind}`;
  setTimeout(() => (el.className = "toast"), 2500);
}

async function login() {
  const pw = document.getElementById("pwInput").value.trim();
  if (!pw) return;
  setToken(pw);
  try {
    await api("admin-games"); // any admin GET doubles as a password check
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    switchTab("games");
  } catch (err) {
    clearToken();
    document.getElementById("gateErr").textContent = "ពាក្យសម្ងាត់មិនត្រឹមត្រូវ / Wrong password";
  }
}
function logout() {
  clearToken();
  document.getElementById("app").style.display = "none";
  document.getElementById("gate").style.display = "flex";
  document.getElementById("pwInput").value = "";
}

let currentTab = "games";
function switchTab(tab) {
  currentTab = tab;
  closeNav();
  document.querySelectorAll("nav button[data-tab]").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  ({ games: renderGames, products: renderProducts, banners: renderBanners, transactions: renderTransactions, settings: renderSettings })[tab]();
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function skeletonRows(n = 3) {
  return `<div class="skeleton">${Array(n).fill('<div class="bar"></div>').join("")}</div>`;
}

function emptyState(icon, text) {
  return `<div class="empty"><span class="ic">${icon}</span>${text}</div>`;
}

// ---------- Reusable image upload field ----------
// Renders a thumbnail + text input (still editable/pasteable) + an upload button.
// `onChangeAttr` is an inline JS string invoked after the URL changes (e.g. to refresh a preview elsewhere).
let imgFieldSeq = 0;
function imageField(fieldName, value, placeholder = "https://...") {
  const uid = `imgf_${++imgFieldSeq}`;
  const hasVal = value && value.trim();
  return `
    <div class="img-field" id="${uid}">
      ${hasVal
        ? `<img class="thumb" src="${esc(value)}" onerror="this.outerHTML='<div class=\\'thumb empty-thumb\\'>🖼️</div>'">`
        : `<div class="thumb empty-thumb">🖼️</div>`}
      <input type="text" value="${esc(value || "")}" data-f="${fieldName}" placeholder="${placeholder}"
             oninput="refreshThumb('${uid}', this.value)">
      <label class="upload-btn" title="Upload image">
        📤<input type="file" accept="image/*" onchange="handleImgUpload(event, '${uid}')">
      </label>
    </div>`;
}
function refreshThumb(uid, url) {
  const wrap = document.getElementById(uid);
  if (!wrap) return;
  const old = wrap.querySelector(".thumb");
  if (url && url.trim()) {
    const img = new Image();
    img.className = "thumb";
    img.src = url;
    img.onerror = () => { img.outerHTML = '<div class="thumb empty-thumb">🖼️</div>'; };
    old.replaceWith(img);
  } else {
    old.outerHTML = '<div class="thumb empty-thumb">🖼️</div>';
  }
}
async function handleImgUpload(event, uid) {
  const file = event.target.files[0];
  if (!file) return;
  const wrap = document.getElementById(uid);
  const btn = wrap.querySelector(".upload-btn");
  const input = wrap.querySelector("input[type=text]");
  btn.classList.add("loading");
  try {
    const url = await uploadFile(file);
    input.value = url;
    refreshThumb(uid, url);
    toast("បានបញ្ចូលរូបភាព");
  } catch (err) {
    toast(err.message, "err");
  } finally {
    btn.classList.remove("loading");
    event.target.value = "";
  }
}

function readRow(tr) {
  const out = {};
  tr.querySelectorAll("input[data-f]").forEach(i => (out[i.dataset.f] = i.value));
  return out;
}

// ---------- GAMES ----------
async function renderGames() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">🎮 Games</h1><p class="sub">ហ្គេមទាំងអស់ដែលបង្ហាញលើគេហទំព័រ</p>
    <div class="stats-row" id="gamesStats"></div>
    <div class="toolbar"><button class="btn" style="width:auto;padding:10px 20px" onclick="addGameRow()">+ បន្ថែមហ្គេមថ្មី</button></div>
    <div class="card-panel" id="gamesTableWrap">${skeletonRows()}</div>`;
  await loadGames();
}
let gamesCache = [];
async function loadGames() {
  const wrap = document.getElementById("gamesTableWrap");
  try {
    const { games } = await api("admin-games");
    gamesCache = games;
    document.getElementById("gamesStats").innerHTML = `<div class="stat-chip"><div class="n">${games.length}</div><div class="l">Total games</div></div>`;
    wrap.innerHTML = !games.length ? emptyState("🎮", 'មិនទាន់មានហ្គេមទេ — ចុច "+ បន្ថែមហ្គេមថ្មី" ខាងលើ') : `<table><thead><tr><th>Image</th><th>Name</th><th>Code</th><th>FazerCards Category</th><th></th></tr></thead>
      <tbody>${games.map(g => `
        <tr data-id="${g.id}">
          <td data-label="Image">${imageField("image_url", g.image_url)}</td>
          <td data-label="Name"><input value="${esc(g.name || "")}" data-f="name"></td>
          <td data-label="Code"><input value="${esc(g.code || "")}" data-f="code"></td>
          <td data-label="FazerCards Category"><input value="${esc(g.fazercards_category_id || "")}" data-f="fazercards_category_id" placeholder="cat_ff_1"></td>
          <td class="actions">
            <button class="btn small ghost" onclick="saveGame(${g.id})">Save</button>
            <button class="btn small danger" onclick="deleteGame(${g.id})">Delete</button>
          </td>
        </tr>`).join("")}
      </tbody></table>`;
  } catch (err) { wrap.innerHTML = emptyState("⚠️", esc(err.message)); }
}
function addGameRow() {
  const wrap = document.getElementById("gamesTableWrap");
  let table = wrap.querySelector("tbody");
  if (!table) { renderGames(); return; }
  const tr = document.createElement("tr");
  tr.className = "new-row";
  tr.innerHTML = `<td data-label="Image">${imageField("image_url", "")}</td>
    <td data-label="Name"><input placeholder="Mobile Legends" data-f="name"></td>
    <td data-label="Code"><input placeholder="ml" data-f="code"></td>
    <td data-label="FazerCards Category"><input placeholder="cat_ff_1" data-f="fazercards_category_id"></td>
    <td class="actions"><button class="btn small" onclick="createGame(this)">Create</button></td>`;
  table.prepend(tr);
}
async function createGame(btn) {
  const body = readRow(btn.closest("tr"));
  try { await api("admin-games", { method: "POST", body: JSON.stringify(body) }); toast("បានបន្ថែម"); loadGames(); }
  catch (err) { toast(err.message, "err"); }
}
async function saveGame(id) {
  const body = { id, ...readRow(document.querySelector(`tr[data-id="${id}"]`)) };
  try { await api("admin-games", { method: "PUT", body: JSON.stringify(body) }); toast("បានរក្សាទុក"); }
  catch (err) { toast(err.message, "err"); }
}
async function deleteGame(id) {
  if (!confirm("លុបហ្គេមនេះ?")) return;

// ---------- PRODUCTS ----------
async function renderProducts() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">💠 Products</h1>
    <p class="sub">Cost = តម្លៃដើម FazerCards wholesale (មិនបង្ហាញអតិថិជន) — Price = តម្លៃលក់</p>
    <div class="stats-row" id="productsStats"></div>
    <div class="toolbar">
      <select id="filterGame" onchange="loadProducts()"><option value="">-- ហ្គេមទាំងអស់ --</option></select>
      <input id="markupPct" type="number" placeholder="Markup %" style="width:110px" value="20">
      <button class="btn ghost" style="width:auto;padding:10px 18px" onclick="applyMarkupToAll()">💰 Apply markup to empty prices</button>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="addProductRow()">+ បន្ថែម Product ថ្មី</button>
    </div>
    <div class="card-panel" id="productsTableWrap">${skeletonRows()}</div>`;
  try {
    const { games } = await api("admin-games");
    const sel = document.getElementById("filterGame");
    games.forEach(g => sel.insertAdjacentHTML("beforeend", `<option value="${esc(g.code)}">${esc(g.name)}</option>`));
  } catch {}
  await loadProducts();
}
function marginBadge(cost, price) {
  const c = parseFloat(cost), p = parseFloat(price);
  if (!isFinite(c) || !isFinite(p) || c <= 0) return `<span style="color:var(--text-dim);font-size:12px">—</span>`;
  const profit = p - c;
  const pct = (profit / c) * 100;
  const color = profit <= 0 ? "var(--red)" : pct < 10 ? "var(--gold-soft)" : "var(--green)";
  const sign = profit > 0 ? "+" : "";
  return `<span style="color:${color};font-weight:700;font-size:13px">${sign}$${profit.toFixed(2)}</span>
    <div style="color:${color};font-size:11px">${sign}${pct.toFixed(0)}%</div>`;
}
function updateMarginCell(tr) {
  const cost = tr.querySelector('input[data-f="cost_usd"]').value;
  const price = tr.querySelector('input[data-f="price"]').value;
  tr.querySelector(".margin-cell").innerHTML = marginBadge(cost, price);
}
async function applyMarkupToAll() {
  const pct = parseFloat(document.getElementById("markupPct").value);
  if (!isFinite(pct)) { toast("សូមវាយ markup % ជាលេខ", "err"); return; }
  const rows = document.querySelectorAll("#productsTableWrap tbody tr[data-id]");
  let updated = 0;
  for (const tr of rows) {
    const priceInput = tr.querySelector('input[data-f="price"]');
    const costInput = tr.querySelector('input[data-f="cost_usd"]');
    const cost = parseFloat(costInput.value);
    if (isFinite(cost) && cost > 0 && (!priceInput.value || parseFloat(priceInput.value) <= 0)) {
      const newPrice = (cost * (1 + pct / 100)).toFixed(2);
      priceInput.value = newPrice;
      updateMarginCell(tr);
      try {
        await api("admin-products", { method: "PUT", body: JSON.stringify({ id: tr.dataset.id, price: newPrice }) });
        updated++;
      } catch (err) { toast(err.message, "err"); }
    }
  }
  toast(updated ? `បានកំណត់តម្លៃ ${updated} product (markup ${pct}%)` : "គ្មាន product ណាទទេត្រូវបំពេញទេ (Price ត្រូវទទេ ហើយ Cost ត្រូវបំពេញ)");
}
async function loadProducts() {
  const wrap = document.getElementById("productsTableWrap");
  const gameCode = document.getElementById("filterGame")?.value || "";
  try {
    const { products } = await api(`admin-products${gameCode ? `?game_code=${encodeURIComponent(gameCode)}` : ""}`);
    const avgMargin = products.filter(p => p.cost_usd > 0 && p.price > 0)
      .map(p => ((p.price - p.cost_usd) / p.cost_usd) * 100);
    const avgTxt = avgMargin.length ? `${(avgMargin.reduce((a, b) => a + b, 0) / avgMargin.length).toFixed(0)}%` : "—";
    document.getElementById("productsStats").innerHTML = `
      <div class="stat-chip"><div class="n">${products.length}</div><div class="l">Products shown</div></div>
      <div class="stat-chip"><div class="n">${avgTxt}</div><div class="l">Avg margin</div></div>`;
    wrap.innerHTML = !products.length ? emptyState("💠", 'មិនទាន់មាន product ទេ — ចុច "+ បន្ថែម Product ថ្មី" ខាងលើ') : `<table><thead><tr><th>Image</th><th>Game code</th><th>Name</th><th>Cost ($)</th><th>Price ($)</th><th>Margin</th><th>FazerCards Offer ID</th><th></th></tr></thead>
      <tbody>${products.map(p => `
        <tr data-id="${p.id}">
          <td data-label="Image">${imageField("image_url", p.image_url)}</td>
          <td data-label="Game code"><input value="${esc(p.game_code || "")}" data-f="game_code"></td>
          <td data-label="Name"><input value="${esc(p.name || "")}" data-f="name"></td>
          <td data-label="Cost"><input value="${p.cost_usd ?? ""}" data-f="cost_usd" placeholder="0.74" oninput="updateMarginCell(this.closest('tr'))"></td>
          <td data-label="Price"><input value="${p.price ?? ""}" data-f="price" oninput="updateMarginCell(this.closest('tr'))"></td>
          <td data-label="Margin" class="margin-cell">${marginBadge(p.cost_usd, p.price)}</td>
          <td data-label="Offer ID"><input value="${esc(p.provider_package || "")}" data-f="provider_package" placeholder="offer_60uc"></td>
          <td class="actions">
            <button class="btn small ghost" onclick="saveProduct(${p.id})">Save</button>
            <button class="btn small danger" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>`).join("")}
      </tbody></table>`;
  } catch (err) { wrap.innerHTML = emptyState("⚠️", esc(err.message)); }
}
function addProductRow() {
  const wrap = document.getElementById("productsTableWrap");
  let table = wrap.querySelector("tbody");
  if (!table) { renderProducts(); return; }
  const tr = document.createElement("tr");
  tr.className = "new-row";
  tr.innerHTML = `<td data-label="Image">${imageField("image_url", "")}</td>
    <td data-label="Game code"><input placeholder="ml" data-f="game_code"></td>
    <td data-label="Name"><input placeholder="500 Diamonds" data-f="name"></td>
    <td data-label="Cost"><input placeholder="0.74" data-f="cost_usd" oninput="updateMarginCell(this.closest('tr'))"></td>
    <td data-label="Price"><input placeholder="0.90" data-f="price" oninput="updateMarginCell(this.closest('tr'))"></td>
    <td data-label="Margin" class="margin-cell">${marginBadge("", "")}</td>
    <td data-label="Offer ID"><input placeholder="offer_60uc" data-f="provider_package"></td>
    <td class="actions"><button class="btn small" onclick="createProduct(this)">Create</button></td>`;
  table.prepend(tr);
}
async function createProduct(btn) {
  const body = readRow(btn.closest("tr"));
  try { await api("admin-products", { method: "POST", body: JSON.stringify(body) }); toast("បានបន្ថែម"); loadProducts(); }
  catch (err) { toast(err.message, "err"); }
}
async function saveProduct(id) {
  const body = { id, ...readRow(document.querySelector(`#productsTableWrap tr[data-id="${id}"]`)) };
  try { await api("admin-products", { method: "PUT", body: JSON.stringify(body) }); toast("បានរក្សាទុក"); }
  catch (err) { toast(err.message, "err"); }
}
async function deleteProduct(id) {
  if (!confirm("លុប product នេះ?")) return;
  try { await api(`admin-products?id=${id}`, { method: "DELETE" }); toast("បានលុប"); loadProducts(); }
  catch (err) { toast(err.message, "err"); }
}

// ---------- TRANSACTIONS ----------
async function renderTransactions() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">🧾 Transactions</h1><p class="sub">ការបញ្ជាទិញថ្មីៗ + delivery status (auto top-up តាម FazerCards)</p>
    <div class="stats-row" id="txStats"></div>
    <div class="toolbar">
      <select id="filterStatus" onchange="loadTransactions()">
        <option value="">-- Payment status ទាំងអស់ --</option>
        <option value="pending">pending</option>
        <option value="paid">paid</option>
        <option value="expired">expired</option>
      </select>
      <button class="btn" style="width:auto;padding:10px 20px" onclick="loadTransactions()">↻ Refresh</button>
    </div>
    <div class="card-panel" id="txTableWrap">${skeletonRows()}</div>`;
  await loadTransactions();
}
async function loadTransactions() {
  const wrap = document.getElementById("txTableWrap");
  const status = document.getElementById("filterStatus")?.value || "";
  try {
    const { transactions } = await api(`admin-transactions${status ? `?status=${status}` : ""}`);
    document.getElementById("txStats").innerHTML = `<div class="stat-chip"><div class="n">${transactions.length}</div><div class="l">Shown</div></div>`;
    if (!transactions.length) { wrap.innerHTML = emptyState("🧾", "មិនទាន់មានប្រតិបត្តិការទេ"); return; }
    wrap.innerHTML = `<table><thead><tr>
        <th>Trx ID</th><th>Game</th><th>User</th><th>Amount</th><th>Status</th><th>Delivery</th><th>Created</th><th></th>
      </tr></thead><tbody>${transactions.map(t => `
        <tr>
          <td data-label="Trx ID" class="mono" title="${esc(t.reference || "")}">${esc(t.trx_id)}</td>
          <td data-label="Game">${esc(t.game_code || "")}</td>
          <td data-label="User">${esc(t.user_id || "")}${t.zone_id ? ` (${esc(t.zone_id)})` : ""}</td>
          <td data-label="Amount" class="mono">$${t.amount ?? "-"}</td>
          <td data-label="Status"><span class="badge ${esc(t.status)}">${esc(t.status)}</span></td>
          <td data-label="Delivery">
            <span class="badge ${esc(t.delivery_status || "pending")}">${esc(t.delivery_status || "pending")}</span>
            ${t.delivery_error ? `<div style="color:var(--red);font-size:11px;margin-top:4px;max-width:220px">${esc(t.delivery_error)}</div>` : ""}
          </td>
          <td data-label="Created" class="mono" style="font-size:12px">${t.created_at ? new Date(t.created_at).toLocaleString() : ""}</td>
          <td class="actions">
            ${t.delivery_status !== "delivered" ? `<button class="btn small ghost" onclick="markDelivered('${esc(t.trx_id)}')">Mark delivered</button>` : ""}
          </td>
        </tr>`).join("")}
      </tbody></table>`;
  } catch (err) { wrap.innerHTML = emptyState("⚠️", esc(err.message)); }
}
async function markDelivered(trxId) {
  try {
    await api("admin-transactions", { method: "PATCH", body: JSON.stringify({ trx_id: trxId, delivery_status: "delivered" }) });
    toast("បានកត់ត្រាថាបានប្រគល់ diamond ស្រេច");
    loadTransactions();
  } catch (err) { toast(err.message, "err"); }
}

    tiktok_link: document.getElementById("s_tt_link").value.trim(),
    footer_desc: document.getElementById("s_footer_desc").value.trim(),

// Auto-login if a token is already saved
(async function init() {
  if (getToken()) {
    try {
      await api("admin-games");
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      switchTab("games");
    } catch { clearToken(); }
  }
  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
})();
</script>
