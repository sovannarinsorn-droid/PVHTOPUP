<!doctype html>
<html lang="km">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PVH TOPUP — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kdam+Thmor+Pro:wght@400;700&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12151c;
  --panel:#181c26;
  --panel-2:#1f2430;
  --line:#2a3040;
  --gold:#e8b04b;
  --gold-dim:#8a6a2c;
  --teal:#4fd1c5;
  --red:#e5646a;
  --text:#e9ecf1;
  --text-dim:#8b93a3;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:'Rajdhani',sans-serif; font-size:16px;
}
h1,h2,h3,.khmer{font-family:'Kdam Thmor Pro',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
#gate{
  height:100vh; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
#gate .card{
  background:var(--panel); border:1px solid var(--line); border-radius:12px;
  padding:36px 40px; width:320px; text-align:center;
}
#gate .brand{color:var(--gold); font-size:22px; margin-bottom:4px;}
#gate p{color:var(--text-dim); margin:0 0 20px; font-size:14px;}
#gate input{
  width:100%; padding:12px 14px; border-radius:8px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-size:15px; margin-bottom:12px;
}
#gate button, .btn{
  width:100%; padding:12px; border-radius:8px; border:none;
  background:var(--gold); color:#1a1206; font-weight:700; font-size:15px;
  cursor:pointer; letter-spacing:.02em;
}
#gate .err{color:var(--red); font-size:13px; min-height:18px;}
#app{display:none; height:100vh;}
.shell{display:flex; height:100%;}
nav{
  width:210px; background:var(--panel); border-right:1px solid var(--line);
  padding:24px 0; flex-shrink:0; display:flex; flex-direction:column;
}
nav .logo{padding:0 20px 24px; color:var(--gold); font-size:19px; border-bottom:1px solid var(--line); margin-bottom:8px;}
nav .logo small{display:block; color:var(--text-dim); font-size:11px; font-family:'Rajdhani'; font-weight:600; letter-spacing:.08em; margin-top:2px;}
nav button{
  text-align:left; background:none; border:none; color:var(--text-dim);
  padding:13px 20px; font-family:'Rajdhani'; font-size:16px; font-weight:600;
  cursor:pointer; border-left:3px solid transparent;
}
nav button.active{color:var(--gold); background:var(--panel-2); border-left-color:var(--gold);}
nav .spacer{flex:1;}
nav .logout{color:var(--red); font-size:13px; opacity:.75;}
main{flex:1; overflow-y:auto; padding:28px 34px;}
main h1{font-size:22px; margin:0 0 4px; color:var(--text);}
main .sub{color:var(--text-dim); font-size:14px; margin:0 0 22px;}
.toolbar{display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center;}
.toolbar select, .toolbar input{
  padding:9px 12px; border-radius:7px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-family:'Rajdhani'; font-size:14px;
}
.toolbar .btn{width:auto; padding:9px 18px; font-size:14px;}
.btn.ghost{background:none; border:1px solid var(--gold-dim); color:var(--gold);}
.btn.small{padding:6px 12px; font-size:13px;}
.btn.danger{background:var(--red); color:#2a0d0f;}
table{width:100%; border-collapse:collapse; background:var(--panel); border-radius:10px; overflow:hidden;}
th, td{padding:11px 14px; text-align:left; border-bottom:1px solid var(--line); font-size:14px;}
th{color:var(--text-dim); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.05em; background:var(--panel-2);}
tr:last-child td{border-bottom:none;}
td.actions{white-space:nowrap; width:1%;}
td input, td select{
  width:100%; padding:6px 8px; border-radius:5px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-family:'Rajdhani'; font-size:14px;
}
.badge{padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; display:inline-block;}
.badge.pending{background:#3a3420; color:#e8c04b;}
.badge.processing{background:#1f3a3a; color:var(--teal);}
.badge.delivered{background:#1e3a24; color:#6fd88a;}
.badge.failed{background:#3a1f22; color:var(--red);}
.badge.manual{background:#302a3a; color:#b39ddb;}
.badge.paid{background:#1e3a24; color:#6fd88a;}
.badge.expired{background:#2a2a2a; color:var(--text-dim);}
.new-row{background:var(--panel-2);}
.empty{color:var(--text-dim); text-align:center; padding:40px 0; font-size:14px;}
.hint{color:var(--text-dim); font-size:12px; margin:-10px 0 14px;}
.toast{
  position:fixed; bottom:24px; right:24px; background:var(--panel-2); border:1px solid var(--line);
  padding:12px 18px; border-radius:8px; font-size:14px; opacity:0; transform:translateY(8px);
  transition:all .25s; pointer-events:none;
}
.toast.show{opacity:1; transform:translateY(0);}
.toast.err{border-color:var(--red); color:var(--red);}
.toast.ok{border-color:#6fd88a; color:#6fd88a;}
.settings-form{max-width:560px; display:flex; flex-direction:column; gap:16px;}
.settings-form label{font-size:13px; color:var(--text-dim); font-weight:600; display:block; margin-bottom:6px;}
.settings-form input, .settings-form textarea{
  width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--line);
  background:var(--panel-2); color:var(--text); font-family:'Rajdhani'; font-size:15px;
}
.settings-form textarea{resize:vertical; min-height:60px;}
.settings-form .preview{
  display:flex; align-items:center; gap:12px; margin-top:8px; padding:10px;
  background:var(--panel); border:1px solid var(--line); border-radius:8px;
}
.settings-form .preview img{width:44px; height:44px; border-radius:50%; object-fit:cover; background:var(--panel-2);}
.settings-form .preview span{color:var(--text-dim); font-size:13px;}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <div class="brand khmer">PVH TOPUP</div>
    <p>Admin Panel</p>
    <input id="pwInput" type="password" placeholder="Admin password" />
    <button onclick="login()">ចូល / Login</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>
<div id="app">
  <div class="shell">
    <nav>
      <div class="logo khmer">PVH TOPUP<small>ADMIN PANEL</small></div>
      <button data-tab="games" class="active" onclick="switchTab('games')">🎮 Games</button>
      <button data-tab="products" onclick="switchTab('products')">💎 Products</button>
      <button data-tab="banners" onclick="switchTab('banners')">🖼️ Banners</button>
      <button data-tab="transactions" onclick="switchTab('transactions')">🧾 Transactions</button>
      <button data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button>
      <div class="spacer"></div>
      <button class="logout" onclick="logout()">↩ Logout</button>
    </nav>
    <main id="main"></main>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = "";
function getToken(){ return localStorage.getItem("pvh_admin_token") || ""; }
function setToken(t){ localStorage.setItem("pvh_admin_token", t); }
function clearToken(){ localStorage.removeItem("pvh_admin_token"); }

async function api(path, opts = {}) {
  const res = await fetch(`/api/${path}`, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": getToken(),
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { logout(); throw new Error("Session expired"); }
  const data = await res.json();
  if (!data.success && res.status >= 400) throw new Error(data.error || "Request failed");
  return data;
}

function toast(msg, kind = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast show ${kind}`;
  setTimeout(() => (el.className = "toast"), 2500);
}

async function login() {
  const pw = document.getElementById("pwInput").value.trim();
  if (!pw) return;
  setToken(pw);
  try {
    await api("admin-games");
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
    switchTab("games");
  } catch (err) {
    clearToken();
    document.getElementById("gateErr").textContent = "ពាក្យសម្ងាត់មិនត្រឹមត្រូវ / Wrong password";
  }
}

function logout() {
  clearToken();
  document.getElementById("app").style.display = "none";
  document.getElementById("gate").style.display = "flex";
  document.getElementById("pwInput").value = "";
}

let currentTab = "games";
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll("nav button[data-tab]").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  ({ games: renderGames, products: renderProducts, banners: renderBanners, transactions: renderTransactions, settings: renderSettings })[tab]();
}

async function renderGames() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">Games</h1><p class="sub">ហ្គេមទាំងអស់ដែលបង្ហាញលើគេហទំព័រ</p>
  <div class="toolbar"><button class="btn" style="width:auto;padding:9px 18px" onclick="addGameRow()">+ បន្ថែមហ្គេមថ្មី</button></div>
  <div id="gamesTableWrap"></div>`;
  await loadGames();
}
let gamesCache = [];
async function loadGames() {
  const wrap = document.getElementById("gamesTableWrap");
  wrap.innerHTML = `<p class="empty">កំពុងផ្ទុក...</p>`;
  try {
    const { games } = await api("admin-games");
    gamesCache = games;
    wrap.innerHTML = `<table><thead><tr><th>ID</th><th>Name</th><th>Code</th><th>Image URL</th><th></th></tr></thead>
    <tbody>${!games.length ? `<tr class="empty-row"><td colspan="5" class="empty">មិនទាន់មានហ្គេមទេ — ចុច "+ បន្ថែមហ្គេមថ្មី" ខាងលើ</td></tr>` : games.map(g => `
    <tr data-id="${g.id}">
      <td class="mono">${g.id}</td>
      <td><input value="${esc(g.name || "")}" data-f="name"></td>
      <td><input value="${esc(g.code || "")}" data-f="code"></td>
      <td><input value="${esc(g.image_url || "")}" data-f="image_url"></td>
      <td class="actions">
        <button class="btn small ghost" onclick="saveGame(${g.id})">Save</button>
        <button class="btn small danger" onclick="deleteGame(${g.id})">Delete</button>
      </td>
    </tr>`).join("")}
    </tbody></table>`;
  } catch (err) { wrap.innerHTML = `<p class="empty">Error: ${esc(err.message)}</p>`; }
}
function addGameRow() {
  const wrap = document.getElementById("gamesTableWrap");
  const table = wrap.querySelector("tbody");
  if (!table) return renderGames();
  const emptyRow = table.querySelector(".empty-row");
  if (emptyRow) emptyRow.remove();
  const tr = document.createElement("tr");
  tr.className = "new-row";
  tr.innerHTML = `<td class="mono">new</td>
    <td><input placeholder="Mobile Legends" data-f="name"></td>
    <td><input placeholder="ml" data-f="code"></td>
    <td><input placeholder="https://..." data-f="image_url"></td>
    <td class="actions"><button class="btn small" onclick="createGame(this)">Create</button></td>`;
  table.prepend(tr);
}
function readRow(tr) {
  const out = {};
  tr.querySelectorAll("input[data-f], select[data-f]").forEach(i => (out[i.dataset.f] = i.value));
  return out;
}
async function createGame(btn) {
  const tr = btn.closest("tr");
  const body = readRow(tr);
  if (!body.name || !body.code) { toast("សូមបំពេញ Name និង Code", "err"); return; }
  try { await api("admin-games", { method: "POST", body: JSON.stringify(body) }); toast("បានបន្ថែម"); loadGames(); }
  catch (err) { toast(err.message, "err"); }
}
async function saveGame(id) {
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const body = { id, ...readRow(tr) };
  try { await api("admin-games", { method: "PUT", body: JSON.stringify(body) }); toast("បានរក្សាទុក"); }
  catch (err) { toast(err.message, "err"); }
}
async function deleteGame(id) {
  if (!confirm("លុបហ្គេមនេះ?")) return;
  try { await api(`admin-games?id=${id}`, { method: "DELETE" }); toast("បានលុប"); loadGames(); }
  catch (err) { toast(err.message, "err"); }
}

let productsGamesCache = [];

async function renderProducts() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">Products</h1>
  <p class="sub">តម្លៃ package + provider_package (សម្រាប់ auto top-up)</p>
  <div class="toolbar">
    <select id="filterGame" onchange="loadProducts()"><option value="">-- ហ្គេមទាំងអស់ --</option></select>
    <button class="btn" style="width:auto;padding:9px 18px" onclick="addProductRow()">+ បន្ថែម Product ថ្មី</button>
  </div>
  <p class="hint" id="noGamesHint" style="display:none">⚠️ ត្រូវបន្ថែមហ្គេមយ៉ាងតិច១ក្នុងទំព័រ Games សិន មុននឹងបន្ថែម Product បាន</p>
  <div id="productsTableWrap"></div>`;
  try {
    const { games } = await api("admin-games");
    productsGamesCache = games || [];
    const sel = document.getElementById("filterGame");
    productsGamesCache.forEach(g => sel.insertAdjacentHTML("beforeend", `<option value="${esc(g.code)}">${esc(g.name)} (${esc(g.code)})</option>`));
    if (!productsGamesCache.length) document.getElementById("noGamesHint").style.display = "block";
  } catch {}
  await loadProducts();
}

function gameSelectOptions(selectedCode) {
  if (!productsGamesCache.length) {
    return `<option value="">-- មិនទាន់មានហ្គេមទេ --</option>`;
  }
  return productsGamesCache.map(g =>
    `<option value="${esc(g.code)}" ${g.code === selectedCode ? "selected" : ""}>${esc(g.name)} (${esc(g.code)})</option>`
  ).join("");
}

async function loadProducts() {
  const wrap = document.getElementById("productsTableWrap");
  const gameCode = document.getElementById("filterGame")?.value || "";
  wrap.innerHTML = `<p class="empty">កំពុងផ្ទុក...</p>`;
  try {
    const { products } = await api(`admin-products${gameCode ? `?game_code=${encodeURIComponent(gameCode)}` : ""}`);
    wrap.innerHTML = `<table><thead><tr><th>ID</th><th>Game</th><th>Name</th><th>Price ($)</th><th>Provider package</th><th>Image URL</th><th></th></tr></thead>
    <tbody>${!products.length ? `<tr class="empty-row"><td colspan="7" class="empty">មិនទាន់មាន product ទេ — ចុច "+ បន្ថែម Product ថ្មី" ខាងលើ</td></tr>` : products.map(p => `
    <tr data-id="${p.id}">
      <td class="mono">${p.id}</td>
      <td><select data-f="game_code">${gameSelectOptions(p.game_code)}</select></td>
      <td><input value="${esc(p.name || "")}" data-f="name"></td>
      <td><input value="${p.price ?? ""}" data-f="price"></td>
      <td><input value="${esc(p.provider_package || "")}" data-f="provider_package" placeholder="MLBB_500_Diamonds"></td>
      <td><input value="${esc(p.image_url || "")}" data-f="image_url" placeholder="https://..."></td>
      <td class="actions">
        <button class="btn small ghost" onclick="saveProduct(${p.id})">Save</button>
        <button class="btn small danger" onclick="deleteProduct(${p.id})">Delete</button>
      </td>
    </tr>`).join("")}
    </tbody></table>`;
  } catch (err) { wrap.innerHTML = `<p class="empty">Error: ${esc(err.message)}</p>`; }
}

function addProductRow() {
  if (!productsGamesCache.length) {
    toast("សូមបន្ថែមហ្គេមនៅទំព័រ Games សិន", "err");
    return;
  }
  const wrap = document.getElementById("productsTableWrap");
  const table = wrap.querySelector("tbody");
  if (!table) return renderProducts();
  const emptyRow = table.querySelector(".empty-row");
  if (emptyRow) emptyRow.remove();
  const preselected = document.getElementById("filterGame")?.value || "";
  const tr = document.createElement("tr");
  tr.className = "new-row";
  tr.innerHTML = `<td class="mono">new</td>
    <td><select data-f="game_code">${gameSelectOptions(preselected)}</select></td>
    <td><input placeholder="500 Diamonds" data-f="name"></td>
    <td><input placeholder="9.50" data-f="price"></td>
    <td><input placeholder="MLBB_500_Diamonds" data-f="provider_package"></td>
    <td><input placeholder="https://..." data-f="image_url"></td>
    <td class="actions"><button class="btn small" onclick="createProduct(this)">Create</button></td>`;
  table.prepend(tr);
}

async function createProduct(btn) {
  const tr = btn.closest("tr");
  const body = readRow(tr);
  if (!body.game_code || !body.name) { toast("សូមជ្រើសរើសហ្គេម និងបំពេញ Name", "err"); return; }
  try { await api("admin-products", { method: "POST", body: JSON.stringify(body) }); toast("បានបន្ថែម"); loadProducts(); }
  catch (err) { toast(err.message, "err"); }
}
async function saveProduct(id) {
  const tr = document.querySelector(`#productsTableWrap tr[data-id="${id}"]`);
  const body = { id, ...readRow(tr) };
  try { await api("admin-products", { method: "PUT", body: JSON.stringify(body) }); toast("បានរក្សាទុក"); }
  catch (err) { toast(err.message, "err"); }
}
async function deleteProduct(id) {
  if (!confirm("លុប product នេះ?")) return;
  try { await api(`admin-products?id=${id}`, { method: "DELETE" }); toast("បានលុប"); loadProducts(); }
  catch (err) { toast(err.message, "err"); }
}

async function renderBanners() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">Banners</h1><p class="sub">រូបភាព banner លើទំព័រដើម</p>
  <div class="toolbar"><button class="btn" style="width:auto;padding:9px 18px" onclick="addBannerRow()">+ បន្ថែម Banner ថ្មី</button></div>
  <div id="bannersTableWrap"></div>`;
  await loadBanners();
}
async function loadBanners() {
  const wrap = document.getElementById("bannersTableWrap");
  wrap.innerHTML = `<p class="empty">កំពុងផ្ទុក...</p>`;
  try {
    const { banners } = await api("admin-banners");
    wrap.innerHTML = `<table><thead><tr><th>ID</th><th>Image URL</th><th>Link</th><th></th></tr></thead>
    <tbody>${!banners.length ? `<tr class="empty-row"><td colspan="4" class="empty">មិនទាន់មាន banner ទេ — ចុច "+ បន្ថែម Banner ថ្មី" ខាងលើ</td></tr>` : banners.map(b => `
    <tr data-id="${b.id}">
      <td class="mono">${b.id}</td>
      <td><input value="${esc(b.image_url || "")}" data-f="image_url"></td>
      <td><input value="${esc(b.link || "")}" data-f="link"></td>
      <td class="actions">
        <button class="btn small ghost" onclick="saveBanner(${b.id})">Save</button>
        <button class="btn small danger" onclick="deleteBanner(${b.id})">Delete</button>
      </td>
    </tr>`).join("")}
    </tbody></table>`;
  } catch (err) { wrap.innerHTML = `<p class="empty">Error: ${esc(err.message)}</p>`; }
}
function addBannerRow() {
  const wrap = document.getElementById("bannersTableWrap");
  const table = wrap.querySelector("tbody");
  if (!table) return renderBanners();
  const emptyRow = table.querySelector(".empty-row");
  if (emptyRow) emptyRow.remove();
  const tr = document.createElement("tr");
  tr.className = "new-row";
  tr.innerHTML = `<td class="mono">new</td>
    <td><input placeholder="https://..." data-f="image_url"></td>
    <td><input placeholder="https://... (optional)" data-f="link"></td>
    <td class="actions"><button class="btn small" onclick="createBanner(this)">Create</button></td>`;
  table.prepend(tr);
}
async function createBanner(btn) {
  const tr = btn.closest("tr");
  const body = readRow(tr);
  if (!body.image_url) { toast("សូមបំពេញ Image URL", "err"); return; }
  try { await api("admin-banners", { method: "POST", body: JSON.stringify(body) }); toast("បានបន្ថែម"); loadBanners(); }
  catch (err) { toast(err.message, "err"); }
}
async function saveBanner(id) {
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  const body = { id, ...readRow(tr) };
  try { await api("admin-banners", { method: "PUT", body: JSON.stringify(body) }); toast("បានរក្សាទុក"); }
  catch (err) { toast(err.message, "err"); }
}
async function deleteBanner(id) {
  if (!confirm("លុប banner នេះ?")) return;
  try { await api(`admin-banners?id=${id}`, { method: "DELETE" }); toast("បានលុប"); loadBanners(); }
  catch (err) { toast(err.message, "err"); }
}

async function renderTransactions() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">Transactions</h1><p class="sub">ការបញ្ជាទិញថ្មីៗ + delivery status</p>
  <div class="toolbar">
    <select id="filterStatus" onchange="loadTransactions()">
      <option value="">-- Payment status ទាំងអស់ --</option>
      <option value="pending">pending</option>
      <option value="paid">paid</option>
      <option value="expired">expired</option>
    </select>
    <button class="btn" style="width:auto;padding:9px 18px" onclick="loadTransactions()">↻ Refresh</button>
  </div>
  <div id="txTableWrap"></div>`;
  await loadTransactions();
}
async function loadTransactions() {
  const wrap = document.getElementById("txTableWrap");
  const status = document.getElementById("filterStatus")?.value || "";
  wrap.innerHTML = `<p class="empty">កំពុងផ្ទុក...</p>`;
  try {
    const { transactions } = await api(`admin-transactions${status ? `?status=${status}` : ""}`);
    if (!transactions.length) { wrap.innerHTML = `<p class="empty">មិនទាន់មានប្រតិបត្តិការទេ</p>`; return; }
    wrap.innerHTML = `<table><thead><tr>
      <th>Trx ID</th><th>Game</th><th>User</th><th>Amount</th><th>Status</th><th>Delivery</th><th>Created</th><th></th>
    </tr></thead><tbody>${transactions.map(t => `
    <tr>
      <td class="mono" title="${esc(t.reference || "")}">${esc(t.trx_id)}</td>
      <td>${esc(t.game_code || "")}</td>
      <td>${esc(t.user_id || "")}${t.zone_id ? ` (${esc(t.zone_id)})` : ""}</td>
      <td class="mono">$${t.amount ?? "-"}</td>
      <td><span class="badge ${esc(t.status)}">${esc(t.status)}</span></td>
      <td>
        <span class="badge ${esc(t.delivery_status || "pending")}">${esc(t.delivery_status || "pending")}</span>
        ${t.delivery_error ? `<div style="color:var(--red);font-size:11px;margin-top:3px;max-width:180px">${esc(t.delivery_error)}</div>` : ""}
      </td>
      <td class="mono" style="font-size:12px">${t.created_at ? new Date(t.created_at).toLocaleString() : ""}</td>
      <td class="actions">
        ${t.delivery_status !== "delivered"
          ? `<button class="btn small ghost" onclick="markDelivered('${esc(t.trx_id)}')">Mark delivered</button>`
          : ""}
      </td>
    </tr>`).join("")}
    </tbody></table>`;
  } catch (err) { wrap.innerHTML = `<p class="empty">Error: ${esc(err.message)}</p>`; }
}
async function markDelivered(trxId) {
  try {
    await api("admin-transactions", {
      method: "PATCH",
      body: JSON.stringify({ trx_id: trxId, delivery_status: "delivered" }),
    });
    toast("បានកត់ត្រាថាបានប្រគល់ diamond ស្រេច");
    loadTransactions();
  } catch (err) { toast(err.message, "err"); }
}

async function renderSettings() {
  const main = document.getElementById("main");
  main.innerHTML = `<h1 class="khmer">Settings</h1>
  <p class="sub">Logo, Facebook, Telegram, TikTok — កែហើយចុច Save លទ្ធផលនឹងបង្ហាញលើគេហទំព័រភ្លាមៗ (មិនចាំបាច់ deploy ថ្មី)</p>
  <div id="settingsWrap"><p class="empty">កំពុងផ្ទុក...</p></div>`;
  try {
    const { settings } = await api("admin-settings");
    const s = settings || {};
    document.getElementById("settingsWrap").innerHTML = `
    <div class="settings-form">
      <div>
        <label>Logo URL (រូបភាព round icon លើ header)</label>
        <input id="s_logo_url" value="${esc(s.logo_url || "")}" placeholder="https://i.ibb.co/xxxx/logo.jpg">
        <div class="preview"><img id="s_logo_preview" src="${esc(s.logo_url || "")}" onerror="this.style.opacity=0.2"><span>Preview</span></div>
      </div>
      <div>
        <label>Site Name</label>
        <input id="s_site_name" value="${esc(s.site_name || "")}" placeholder="PVH TOPUP">
      </div>
      <div>
        <label>Footer Name</label>
        <input id="s_footer_name" value="${esc(s.footer_name || "")}" placeholder="PVH TOPUP">
      </div>
      <div>
        <label>Telegram Link (សម្រាប់ Contact Admin)</label>
        <input id="s_tg_link" value="${esc(s.admin_telegram_link || "")}" placeholder="https://t.me/smos_sne1">
      </div>
      <div>
        <label>Telegram Display Name</label>
        <input id="s_tg_name" value="${esc(s.admin_telegram_name || "")}" placeholder="@smos_sne1">
      </div>
      <div>
        <label>Facebook Page Link</label>
        <input id="s_fb_link" value="${esc(s.facebook_link || "")}" placeholder="https://www.facebook.com/yourpage">
      </div>
      <div>
        <label>TikTok Link</label>
        <input id="s_tt_link" value="${esc(s.tiktok_link || "")}" placeholder="https://www.tiktok.com/@yourhandle">
      </div>
      <div>
        <label>Footer Description</label>
        <textarea id="s_footer_desc" placeholder="សេវាកម្មបញ្ចូលលុយហ្គេម...">${esc(s.footer_desc || "")}</textarea>
      </div>
      <div>
        <label>Copyright Text</label>
        <input id="s_copyright" value="${esc(s.copyright || "")}" placeholder="© 2026 PVH TOPUP. All rights reserved.">
      </div>
      <button class="btn" style="width:auto;padding:11px 24px" onclick="saveSettings()">Save Settings</button>
    </div>`;
    document.getElementById("s_logo_url").addEventListener("input", e => {
      document.getElementById("s_logo_preview").src = e.target.value;
    });
  } catch (err) {
    document.getElementById("settingsWrap").innerHTML = `<p class="empty">Error: ${esc(err.message)}</p>`;
  }
}
async function saveSettings() {
  const body = {
    logo_url: document.getElementById("s_logo_url").value.trim(),
    site_name: document.getElementById("s_site_name").value.trim(),
    footer_name: document.getElementById("s_footer_name").value.trim(),
    admin_telegram_link: document.getElementById("s_tg_link").value.trim(),
    admin_telegram_name: document.getElementById("s_tg_name").value.trim(),
    facebook_link: document.getElementById("s_fb_link").value.trim(),
    tiktok_link: document.getElementById("s_tt_link").value.trim(),
    footer_desc: document.getElementById("s_footer_desc").value.trim(),
    copyright: document.getElementById("s_copyright").value.trim(),
  };
  try {
    await api("admin-settings", { method: "PUT", body: JSON.stringify(body) });
    toast("បានរក្សាទុក — reload គេហទំព័រដើមម្តងទៀតដើម្បីមើលការផ្លាស់ប្តូរ");
  } catch (err) {
    toast(err.message, "err");
  }
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

(async function init() {
  if (getToken()) {
    try {
      await api("admin-games");
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      switchTab("games");
    } catch { clearToken(); }
  }
  document.getElementById("pwInput").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
})();
</script>
</body>
</html>
