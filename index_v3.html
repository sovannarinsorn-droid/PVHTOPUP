<!--
DESIGN PLAN — PVH TOPUP storefront (v2: sky-blue glassmorphism, per user request)
Subject: Cambodian mobile-game diamond top-up shop (Free Fire, Mobile Legends).
Audience: young Khmer mobile gamers on phones, low patience, want 3 taps to pay.
Page's job: pick game → pick diamond package → confirm player ID → pay via KHQR → see delivery.

Color (named):
  --bg-top/--bg-bottom: #CDF3FF → #6FB8E6  (open-sky gradient backdrop)
  --glass / --glass-strong: translucent white panels, blurred — the "glass" the user asked for
  --gold: #F2A93B  (sun accent — prices, badges; sky+sun is a natural, literal pairing here)
  --gem:  #0096C7  (deep sky-blue — CTA button, interactive accents)
  --success: #2A9D8F (teal-green — ID valid / delivered states, reads as "clear water" against the sky)
  --text: #0B3A5B (deep navy, readable on light glass) / --muted: #5D82A6

Type: Space Grotesk (display) / Inter (body) / JetBrains Mono (IDs, prices, refs) — unchanged.

Signature element: cut-gem clipped corners, still applied to cards/buttons/QR frame, now rendered
as frosted glass panels floating over the sky gradient rather than solid dark cards.
-->
<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PVH TOPUP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg-top:#CDF3FF; --bg-bottom:#6FB8E6;
  --glass:rgba(255,255,255,.38); --glass-strong:rgba(255,255,255,.6); --glass-border:rgba(255,255,255,.65);
  --gold:#F2A93B; --gem:#0096C7; --success:#2A9D8F;
  --text:#0B3A5B; --muted:#5D82A6;
  --danger:#E63946; --radius-facet:16px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; min-height:100%;
  background:linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%) fixed;
  color:var(--text); font-family:'Inter',sans-serif; overflow-x:hidden;}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer; border:none;}
::-webkit-scrollbar{display:none;}

.facet{
  clip-path: polygon(var(--radius-facet) 0, 100% 0, 100% calc(100% - var(--radius-facet)), calc(100% - var(--radius-facet)) 100%, 0 100%, 0 var(--radius-facet));
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  display:flex; align-items:center; gap:10px;
  padding:12px 16px; background:var(--glass); backdrop-filter:blur(16px) saturate(160%);
  border-bottom:1px solid var(--glass-border); box-shadow:0 4px 20px rgba(11,58,91,.08);
}
.topbar img.logo{height:34px; width:34px; border-radius:8px; object-fit:cover; box-shadow:0 0 12px rgba(212,175,55,.35);}
.topbar .sitename{font-weight:700; font-size:16px; letter-spacing:.3px;}
.topbar .spacer{flex:1;}
.topbar .contact-btn{
  display:flex; align-items:center; gap:6px; padding:8px 12px;
  background:var(--glass-strong); color:var(--gold); font-size:13px; font-weight:600;
  clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}

/* ---------- hero banner ---------- */
.hero{position:relative; width:100%; aspect-ratio:16/8; overflow:hidden; background:var(--glass);
  clip-path: polygon(0 0, 100% 0, 100% 94%, 0 100%);}
.hero-track{display:flex; height:100%; transition:transform .5s ease;}
.hero-slide{flex:0 0 100%; height:100%;}
.hero-slide img{width:100%; height:100%; object-fit:cover; display:block;}
.hero-dots{position:absolute; bottom:14px; left:0; right:0; display:flex; justify-content:center; gap:6px;}
.hero-dots span{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.35);}
.hero-dots span.active{background:var(--gem); width:16px; border-radius:4px;}
.hero-empty{display:flex; align-items:center; justify-content:center; height:100%; color:var(--muted); font-size:13px;}

/* ---------- small promo ---------- */
.promo-strip{display:flex; gap:10px; padding:12px 16px; overflow-x:auto;}
.promo-strip img{height:64px; border-radius:10px; flex:0 0 auto;}

/* ---------- section ---------- */
.section{padding:18px 16px 6px;}
.section h2{font-size:15px; color:var(--muted); font-weight:600; letter-spacing:.4px; text-transform:uppercase; margin:0 0 12px;}

/* ---------- game grid ---------- */
.game-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px 20px;}
.game-card, .product-card, .id-form, .sheet{
  backdrop-filter:blur(14px) saturate(160%); border:1px solid var(--glass-border);
  box-shadow:0 8px 24px rgba(11,58,91,.12);
}
.game-card{
  position:relative; background:var(--glass); aspect-ratio:1/1.05; overflow:hidden;
  display:flex; flex-direction:column; justify-content:flex-end;
}
.game-card img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.55;}
.game-card .label{position:relative; z-index:2; padding:12px; font-weight:700; font-size:15px; color:#fff;
  background:linear-gradient(0deg, rgba(11,14,20,.95), transparent);}

/* ---------- product grid (game detail) ---------- */
.detail-header{display:flex; align-items:center; gap:12px; padding:14px 16px;}
.back-btn{width:36px; height:36px; border-radius:10px; background:var(--glass-strong); display:flex; align-items:center; justify-content:center; font-size:18px;}
.detail-header .gname{font-weight:700; font-size:17px;}

.id-form{margin:0 16px 16px; background:var(--glass); padding:14px; clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
.id-form label{font-size:12px; color:var(--muted); display:block; margin-bottom:6px;}
.id-row{display:flex; gap:8px; margin-bottom:10px;}
.id-row input{flex:1; background:var(--glass-strong); border:1px solid rgba(11,58,91,.18); color:var(--text);
  padding:11px 12px; border-radius:8px; font-size:14px; font-family:'JetBrains Mono',monospace;}
.id-row input:focus{outline:2px solid var(--gem); outline-offset:-1px;}
.id-status{font-size:13px; min-height:18px; padding-top:2px;}
.id-status.ok{color:var(--success);}
.id-status.err{color:var(--danger);}
.id-status.checking{color:var(--muted);}

.product-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 18px;}
.product-card{
  background:var(--glass); padding:14px 12px; text-align:center; position:relative;
}
.product-card.selected{border-color:var(--gem); box-shadow:0 0 0 1px var(--gem), 0 0 16px rgba(0,150,199,.3);}
.product-card .badge{position:absolute; top:6px; right:10px; font-size:10px; background:var(--gold); color:#1a1305;
  padding:2px 6px; border-radius:4px; font-weight:700;}
.product-card .pname{font-size:13.5px; font-weight:600; margin-bottom:6px;}
.product-card .pprice{font-family:'JetBrains Mono',monospace; color:var(--gold); font-weight:600; font-size:15px;}

.buy-bar{position:sticky; bottom:0; z-index:40; padding:12px 16px calc(12px + env(safe-area-inset-bottom));
  background:var(--glass-strong); backdrop-filter:blur(16px) saturate(160%); border-top:1px solid var(--glass-border);
  display:flex; align-items:center; gap:12px;}
.buy-bar .total{flex:1;}
.buy-bar .total .l{font-size:11px; color:var(--muted);}
.buy-bar .total .v{font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700; color:var(--gold);}
.btn-primary{
  background:var(--gem); color:#fff; font-weight:700; font-size:14.5px; padding:14px 26px;
  clip-path: polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
}
.btn-primary:disabled{background:#3a4250; color:var(--muted);}

/* ---------- payment sheet ---------- */
.sheet-backdrop{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:90; display:flex; align-items:flex-end;}
.sheet{width:100%; background:var(--glass); padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  clip-path: polygon(18px 0,100% 0,100% 100%,0 100%,0 18px); max-height:88vh; overflow-y:auto;}
.sheet h3{margin:0 0 4px;}
.sheet .sub{color:var(--muted); font-size:13px; margin-bottom:16px;}
.qr-frame{background:#fff; padding:16px; margin:0 auto 14px; width:min(240px,70vw);
  clip-path: polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);}
.qr-frame canvas, .qr-frame img{width:100%; height:auto; display:block;}
.pay-amount{text-align:center; font-family:'JetBrains Mono',monospace; font-size:22px; color:var(--gold); font-weight:700; margin-bottom:4px;}
.pay-timer{text-align:center; color:var(--muted); font-size:13px; margin-bottom:16px;}
.pay-status{text-align:center; padding:12px; border-radius:10px; font-size:14px; font-weight:600;}
.pay-status.waiting{background:rgba(255,255,255,.05); color:var(--muted);}
.pay-status.success{background:rgba(42,157,143,.14); color:var(--success);}
.pay-status.processing{background:rgba(242,169,59,.14); color:var(--gold);}
.pay-status.failed{background:rgba(255,107,107,.12); color:var(--danger);}
.sheet .close-btn{width:100%; margin-top:16px; padding:12px; background:var(--glass-strong); color:var(--muted); border-radius:10px; font-weight:600;}

/* ---------- footer ---------- */
footer{padding:28px 16px 40px; text-align:center; color:var(--muted); font-size:12px; border-top:1px solid var(--glass-border); margin-top:10px;}
footer .fname{color:var(--text); font-weight:700; margin-bottom:6px;}
footer .links{display:flex; justify-content:center; gap:16px; margin:10px 0;}

.skeleton{background:linear-gradient(90deg, var(--glass) 25%, var(--glass-strong) 37%, var(--glass) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%{background-position:100% 0;} 100%{background-position:0 0;}}

.toast{position:fixed; left:16px; right:16px; bottom:20px; z-index:200; padding:13px 16px; border-radius:10px;
  background:var(--glass-strong); color:var(--text); font-size:13.5px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.4);
  transform:translateY(120%); transition:transform .25s ease;}
.toast.show{transform:translateY(0);}
.toast.err{background:rgba(255,107,107,.16); color:var(--danger);}

@media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
(function(){
"use strict";

// ---- constants shared with the backend (must match server_v9.py) ----
const PAYLOAD_KEY = "6Imhmam1ob2xienZ5a3l3c2hzbG9kIiwic";
const SIGNING_SECRET = "sokiiteam-secure-v1";
const PAY_TIMEOUT_SECONDS = 300; // 5 min KHQR expiry window

// ---- state ----
let state = {
  view: "home",       // home | game
  games: [],
  banners: [],
  settings: null,
  activeGame: null,
  products: [],
  selectedProduct: null,
  playerId: "",
  zoneId: "",
  idCheck: null,       // null | "checking" | {ok:true,name} | {ok:false}
  heroIndex: 0,
};

// ---- helpers ----
function $(sel, root){ return (root||document).querySelector(sel); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg, isErr){
  const t = $("#toast");
  t.textContent = msg;
  t.className = "toast show" + (isErr ? " err" : "");
  clearTimeout(toast._h);
  toast._h = setTimeout(()=> t.classList.remove("show"), 3200);
}
async function api(path, opts){
  opts = opts || {};
  const res = await fetch("/api/" + path, {
    method: opts.method || "GET",
    headers: Object.assign({"Content-Type":"application/json"}, opts.headers||{}),
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  let data;
  try { data = await res.json(); } catch(e){ data = {}; }
  return data;
}
function decryptPayload(payloadB64){
  const bytes = CryptoJS.AES.decrypt(payloadB64, PAYLOAD_KEY);
  const text = bytes.toString(CryptoJS.enc.Utf8);
  return JSON.parse(text);
}

// ---- data loading ----
async function loadSiteSettings(){
  const r = await api("get-site-settings");
  if(r.success) state.settings = r.settings;
  renderTopbarAndFooter();
}
async function loadHome(){
  const r = await api("get-home-data");
  if(!r.success) { toast("មិនអាចផ្ទុកទិន្នន័យបានទេ", true); return; }
  const payload = decryptPayload(r.payload);
  state.games = payload.games || [];
  state.banners = payload.banners || [];
  render();
  startHeroRotation();
}
async function openGame(game){
  state.activeGame = game;
  state.view = "game";
  state.products = [];
  state.selectedProduct = null;
  state.playerId = "";
  state.zoneId = "";
  state.idCheck = null;
  render();
  const r = await api("get-topup-data?id=" + encodeURIComponent(game.code));
  if(!r.success){ toast("មិនអាចផ្ទុក package បានទេ", true); return; }
  const payload = decryptPayload(r.payload);
  state.products = payload.products || [];
  render();
}
function goHome(){
  state.view = "home";
  state.activeGame = null;
  render();
}

// ---- ID validation (debounced) ----
let idCheckTimer = null;
function onIdInput(field, value){
  state[field] = value;
  state.idCheck = null;
  renderIdStatus();
  clearTimeout(idCheckTimer);
  const needsZone = !!state.activeGame.has_server_id;
  if(!state.playerId || (needsZone && !state.zoneId)) return;
  idCheckTimer = setTimeout(checkId, 550);
}
async function checkId(){
  state.idCheck = "checking";
  renderIdStatus();
  const r = await api("check-user", {method:"POST", body:{
    gameCode: state.activeGame.code, userId: state.playerId, zoneId: state.zoneId || undefined,
  }});
  if(r.success && r.name){
    state.idCheck = {ok:true, name:r.name};
  } else if(r.success && r.name === null){
    state.idCheck = null; // auto-check unavailable server-side, don't block checkout
  } else {
    state.idCheck = {ok:false};
  }
  renderIdStatus();
}
function renderIdStatus(){
  const el = $("#idStatus");
  if(!el) return;
  if(state.idCheck === "checking"){ el.textContent = "កំពុងឆែក ID..."; el.className = "id-status checking"; }
  else if(state.idCheck && state.idCheck.ok){ el.textContent = "✓ " + state.idCheck.name; el.className = "id-status ok"; }
  else if(state.idCheck && !state.idCheck.ok){ el.textContent = "✗ រកមិនឃើញ Player ID"; el.className = "id-status err"; }
  else { el.textContent = ""; el.className = "id-status"; }
  updateBuyBarState();
}

// ---- product selection ----
function selectProduct(id){
  state.selectedProduct = state.products.find(p => p.id === id) || null;
  render();
}
function updateBuyBarState(){
  const btn = $("#buyBtn");
  if(!btn) return;
  const needsZone = !!(state.activeGame && state.activeGame.has_server_id);
  const ready = state.selectedProduct && state.playerId && (!needsZone || state.zoneId) && !(state.idCheck && state.idCheck.ok === false);
  btn.disabled = !ready;
}

// ---- checkout / payment ----
let pollPayTimer = null, pollTopupTimer = null, countdownTimer = null;

async function buyNow(){
  if(!state.selectedProduct) return;
  const amount = Number(state.selectedProduct.price);
  const userId = state.playerId;
  const timestamp = Date.now().toString();
  const sigPayload = `${userId}${amount}${timestamp}`;
  const signature = CryptoJS.HmacSHA256(sigPayload, SIGNING_SECRET).toString();

  const btn = $("#buyBtn");
  if(btn){ btn.disabled = true; btn.textContent = "កំពុងបង្កើត QR..."; }

  const r = await api("create-payment", {
    method:"POST",
    headers:{"x-signature":signature, "x-timestamp":timestamp},
    body:{amount, userId, zoneId: state.zoneId || "", gameCode: state.activeGame.code, productId: state.selectedProduct.id},
  });

  if(!r.success){
    toast(r.error || "បង្កើត QR មិនជោគជ័យ", true);
    if(btn){ btn.disabled = false; btn.textContent = "ទិញឥឡូវ"; }
    return;
  }
  openPaymentSheet(r.trx_id, r.qr_data, amount);
}

function openPaymentSheet(trxId, qrData, amount){
  let secondsLeft = PAY_TIMEOUT_SECONDS;
  const root = document.createElement("div");
  root.className = "sheet-backdrop";
  root.id = "paySheet";
  root.innerHTML = `
    <div class="sheet">
      <h3>ស្កេន QR ដើម្បីទូទាត់</h3>
      <div class="sub">CamRapidPay · KHQR</div>
      <div class="qr-frame" id="qrFrame"></div>
      <div class="pay-amount">$${amount.toFixed(2)}</div>
      <div class="pay-timer" id="payTimer">នៅសល់ 05:00</div>
      <div class="pay-status waiting" id="payStatus">កំពុងរង់ចាំការទូទាត់...</div>
      <button class="close-btn" id="closeSheetBtn">បិទ</button>
    </div>`;
  document.body.appendChild(root);
  new QRCode($("#qrFrame"), { text: qrData, width: 400, height: 400, correctLevel: QRCode.CorrectLevel.M });

  $("#closeSheetBtn").onclick = () => closePaymentSheet(trxId, true);

  countdownTimer = setInterval(() => {
    secondsLeft--;
    const m = String(Math.floor(secondsLeft/60)).padStart(2,"0");
    const s = String(secondsLeft%60).padStart(2,"0");
    const timerEl = $("#payTimer");
    if(timerEl) timerEl.textContent = `នៅសល់ ${m}:${s}`;
    if(secondsLeft <= 0){
      clearInterval(countdownTimer);
      api("expire-payment", {method:"POST", body:{trx_id: trxId}});
      setPayStatus("failed", "QR ផុតកំណត់ — សូមចាប់ផ្តើមម្តងទៀត");
      clearInterval(pollPayTimer);
    }
  }, 1000);

  pollPayTimer = setInterval(async () => {
    const r = await api("check-payment", {method:"POST", body:{trx_id: trxId}});
    if(r.paid){
      clearInterval(pollPayTimer);
      clearInterval(countdownTimer);
      const ds = (r.data && r.data.delivery_status) || null;
      handleDeliveryStatus(trxId, ds);
    } else if(r.expired){
      clearInterval(pollPayTimer);
      clearInterval(countdownTimer);
      setPayStatus("failed", "QR ផុតកំណត់ — សូមចាប់ផ្តើមម្តងទៀត");
    }
  }, 3000);
}

function setPayStatus(kind, text){
  const el = $("#payStatus");
  if(!el) return;
  el.className = "pay-status " + kind;
  el.textContent = text;
}

function handleDeliveryStatus(trxId, ds){
  if(ds === "delivered"){
    setPayStatus("success", "✓ ទូទាត់ជោគជ័យ — ទទួល Diamond ដោយស្វ័យប្រវត្តិ!");
  } else if(ds === "processing"){
    setPayStatus("processing", "⏳ កំពុងបញ្ជូន Diamond ស្វ័យប្រវត្តិ...");
    pollTopupTimer = setInterval(async () => {
      const r = await api("check-topup-status", {method:"POST", body:{trx_id: trxId}});
      if(r.delivery_status === "delivered"){
        clearInterval(pollTopupTimer);
        setPayStatus("success", "✓ ទូទាត់ជោគជ័យ — ទទួល Diamond ដោយស្វ័យប្រវត្តិ!");
      } else if(r.delivery_status === "failed"){
        clearInterval(pollTopupTimer);
        setPayStatus("failed", "ទូទាត់ជោគជ័យ ប៉ុន្តែបញ្ជូនស្វ័យប្រវត្តិមិនកើត — ទាក់ទង admin ខាងក្រោម");
      }
    }, 4000);
  } else if(ds === "failed"){
    setPayStatus("failed", "ទូទាត់ជោគជ័យ ប៉ុន្តែបញ្ជូនស្វ័យប្រវត្តិមិនកើត — ទាក់ទង admin ខាងក្រោម");
  } else {
    setPayStatus("success", "✓ ទូទាត់ជោគជ័យ — admin នឹងបញ្ជូនជូនក្នុងពេលឆាប់ៗ");
  }
}

function closePaymentSheet(trxId, userClosed){
  clearInterval(pollPayTimer); clearInterval(pollTopupTimer); clearInterval(countdownTimer);
  const el = $("#paySheet");
  if(el) el.remove();
  const btn = $("#buyBtn");
  if(btn){ btn.disabled = false; btn.textContent = "ទិញឥឡូវ"; }
  if(userClosed && trxId) api("expire-payment", {method:"POST", body:{trx_id: trxId}}).catch(()=>{});
}

// ---- hero rotation ----
let heroTimer = null;
function startHeroRotation(){
  clearInterval(heroTimer);
  const slides = (state.banners||[]).filter(b => b.type === "main_slider");
  if(slides.length < 2) return;
  heroTimer = setInterval(() => {
    state.heroIndex = (state.heroIndex + 1) % slides.length;
    const track = $("#heroTrack");
    if(track) track.style.transform = `translateX(-${state.heroIndex*100}%)`;
    document.querySelectorAll(".hero-dots span").forEach((d,i)=>d.classList.toggle("active", i===state.heroIndex));
  }, 4000);
}

// ---- rendering ----
function renderTopbarAndFooter(){
  const s = state.settings || {};
  const tb = $("#topbar");
  if(tb){
    tb.innerHTML = `
      <!-- logo image hidden from topbar per request — LOGO_URL setting itself is left untouched -->
      ${false ? `<img class="logo" src="${esc(s.LOGO_URL)}" alt="logo">` : ""}
      <div class="sitename">${esc(s.SITE_NAME || "PVH TOPUP")}</div>
      <div class="spacer"></div>
      ${s.ADMIN_TELEGRAM_LINK ? `<a class="contact-btn" href="${esc(s.ADMIN_TELEGRAM_LINK)}" target="_blank">💬 ជំនួយ</a>` : ""}
    `;
  }
  const ft = $("#footer");
  if(ft){
    ft.innerHTML = `
      <div class="fname">${esc(s.FOOTER_NAME || "PVH TOPUP")}</div>
      <div>${esc(s.FOOTER_DESC || "")}</div>
      <div class="links">
        ${s.ADMIN_TELEGRAM_LINK ? `<a href="${esc(s.ADMIN_TELEGRAM_LINK)}" target="_blank">Telegram</a>` : ""}
        ${s.FACEBOOK_LINK ? `<a href="${esc(s.FACEBOOK_LINK)}" target="_blank">Facebook</a>` : ""}
        ${s.TIKTOK_LINK ? `<a href="${esc(s.TIKTOK_LINK)}" target="_blank">TikTok</a>` : ""}
      </div>
      <div>${esc(s.COPYRIGHT || "")}</div>
    `;
  }
}

function renderHeroAndPromo(){
  const mainSlides = (state.banners||[]).filter(b=>b.type==="main_slider");
  const promoSlides = (state.banners||[]).filter(b=>b.type==="small_promo");
  const hero = mainSlides.length ? `
    <div class="hero">
      <div class="hero-track" id="heroTrack">
        ${mainSlides.map(b => `<div class="hero-slide"><img src="${esc(b.image_url)}" alt=""></div>`).join("")}
      </div>
      ${mainSlides.length>1 ? `<div class="hero-dots">${mainSlides.map((_,i)=>`<span class="${i===0?'active':''}"></span>`).join("")}</div>` : ""}
    </div>` : `<div class="hero"><div class="hero-empty">🖼️ មិនទាន់មាន banner</div></div>`;
  const promo = promoSlides.length ? `
    <div class="promo-strip">${promoSlides.map(b=>`<img src="${esc(b.image_url)}" alt="">`).join("")}</div>` : "";
  return hero + promo;
}

function renderHome(){
  return `
    ${renderHeroAndPromo()}
    <div class="section"><h2>ជ្រើសរើសហ្គេម</h2></div>
    <div class="game-grid">
      ${state.games.length ? state.games.map(g => `
        <div class="game-card facet" onclick="__app.openGame(${g.id})">
          ${g.image_url ? `<img src="${esc(g.image_url)}" alt="">` : ""}
          <div class="label">${esc(g.name)}</div>
        </div>`).join("") : `<div class="skeleton" style="height:160px;grid-column:1/-1;border-radius:12px;"></div><div class="skeleton" style="height:160px;border-radius:12px;"></div>`}
    </div>
  `;
}

function renderGame(){
  const g = state.activeGame;
  const needsZone = !!g.has_server_id;
  const productsHtml = state.products.length ? state.products.map(p => `
    <div class="product-card facet ${state.selectedProduct && state.selectedProduct.id===p.id ? 'selected':''}" onclick="__app.selectProduct(${p.id})">
      ${p.section==='recommend' ? `<span class="badge">⭐ ពេញនិយម</span>` : ""}
      <div class="pname">${esc(p.name)}</div>
      <div class="pprice">$${Number(p.price).toFixed(2)}</div>
    </div>`).join("") : `<div class="skeleton" style="height:80px;border-radius:12px;"></div><div class="skeleton" style="height:80px;border-radius:12px;"></div><div class="skeleton" style="height:80px;border-radius:12px;"></div><div class="skeleton" style="height:80px;border-radius:12px;"></div>`;

  return `
    <div class="detail-header">
      <div class="back-btn" onclick="__app.goHome()">←</div>
      <div class="gname">${esc(g.name)}</div>
    </div>
    <div class="id-form">
      <label>Player ID</label>
      <div class="id-row">
        <input type="text" inputmode="numeric" placeholder="បញ្ចូល Player ID" value="${esc(state.playerId)}"
          oninput="__app.onIdInput('playerId', this.value)">
        ${needsZone ? `<input type="text" inputmode="numeric" placeholder="Zone ID" style="max-width:90px" value="${esc(state.zoneId)}"
          oninput="__app.onIdInput('zoneId', this.value)">` : ""}
      </div>
      <div class="id-status" id="idStatus"></div>
    </div>
    <div class="section"><h2>ជ្រើសរើស Package</h2></div>
    <div class="product-grid">${productsHtml}</div>
    <div class="buy-bar">
      <div class="total">
        <div class="l">សរុប</div>
        <div class="v">$${state.selectedProduct ? Number(state.selectedProduct.price).toFixed(2) : "0.00"}</div>
      </div>
      <button class="btn-primary" id="buyBtn" disabled onclick="__app.buyNow()">ទិញឥឡូវ</button>
    </div>
  `;
}

function render(){
  const app = $("#app");
  app.innerHTML = `
    <div class="topbar" id="topbar"></div>
    <div id="main">${state.view === "home" ? renderHome() : renderGame()}</div>
    <footer id="footer"></footer>
  `;
  renderTopbarAndFooter();
  if(state.view === "game"){ renderIdStatus(); updateBuyBarState(); }
}

// expose the handful of functions used by inline onclick/oninput in rendered HTML
window.__app = { openGame: (id)=>{ const g = state.games.find(x=>x.id===id); if(g) openGame(g); },
  goHome, selectProduct, onIdInput, buyNow };

// ---- boot ----
render();
loadSiteSettings();
loadHome();

})();
</script>
</body>
</html>
